<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Claude Code 源码深度解析与 Agent Harness 搭建 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🤖";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>Claude Code 源码深度解析与 Agent Harness 搭建</h1>
        <div class="sub">🤖 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: 'AI Coding Agent 前世今生', topics: ['AI编程助手演进史', 'Agent范式对比', 'Claude Code定位', 'Harness工程护城河'], file: '01.html' },
        { num: '02', title: '环境搭建与逆向工具链', topics: ['源码获取与格式化', 'Chrome DevTools调试', 'Monkey Patch拦截API', '三种逆向方法对比'], file: '02.html' },
        { num: '03', title: '从零实现最简 Agent Loop', topics: ['while(true)循环', 'Anthropic API调用', 'stop_reason检测', 'v0 Bash Agent (50行)'], file: '03.html' },
        { num: '04', title: 'Claude Code 顶层架构拆解', topics: ['7大组件概览', '4层架构模型', '启动流程全链路', '12层Harness Stack'], file: '04.html' },
        { num: '05', title: 'Tool Use 协议深度解析', topics: ['tool_use/tool_result格式', 'JSON Schema最佳实践', '并行工具调用', 'Streaming状态机'], file: '05.html' },
        { num: '06', title: '实现四件套工具', topics: ['Bash/Read/Write/Edit', '工具注册表模式', '原子写入与参数校验', 'v1 Agent (200行)'], file: '06.html' },
        { num: '07', title: 'System Prompt 工程', topics: ['5层Prompt分层', 'Prompt Cache断点策略', 'SKILL.md懒加载', '92%前缀复用率'], file: '07.html' },
        { num: '08', title: 'QueryEngine 主循环源码拆解', topics: ['queryLoop异步生成器', '消息队列交替规则', 'turn计数与退出', 'stop_reason状态机'], file: '08.html' },
        { num: '09', title: '实现 Todo 任务规划', topics: ['TodoWrite CRUD', '依赖关系图', '状态流转', 'System Reminder注入'], file: '09.html' },
        { num: '10', title: '上下文压缩机制', topics: ['5阶段压缩管线', '92%阈值触发', 'Sonnet 4压缩', 'Token计数实现'], file: '10.html' },
        { num: '11', title: '实现上下文管理', topics: ['滑动窗口截断', '自动摘要生成', '对话持久化', 'Haiku降本策略'], file: '11.html' },
        { num: '12', title: 'Sub-Agent 架构分析', topics: ['AgentTool源码', 'fork机制', '脏上下文隔离', '6种TaskType'], file: '12.html' },
        { num: '13', title: '实现 Sub-Agent 系统', topics: ['进程隔离方案', '并行调度', '结果序列化', 'v3 Agent (450行)'], file: '13.html' },
        { num: '14', title: 'Skills 与知识加载机制', topics: ['SkillTool实现', 'CLAUDE.md三层级', '懒加载策略', '优先级合并'], file: '14.html' },
        { num: '15', title: '权限系统源码拆解', topics: ['7种权限模式', '规则链评估', 'ML分类器独立评估', 'deny优先原则'], file: '15.html' },
        { num: '16', title: '实现权限控制', topics: ['白名单/黑名单', '模式切换', '用户确认回调', '危险操作拦截'], file: '16.html' },
        { num: '17', title: 'Bash 沙箱与安全防线', topics: ['4层纵深防御', '命令白名单', 'Shell注入防护', '文件系统边界'], file: '17.html' },
        { num: '18', title: 'MCP 协议深度解析', topics: ['协议生命周期', '3种传输层', 'Tool Annotations', 'Elicitation机制'], file: '18.html' },
        { num: '19', title: '实现 MCP 集成', topics: ['STDIO Server管理', 'Streamable HTTP', '工具发现与注册', '多Server聚合'], file: '19.html' },
        { num: '20', title: 'Context Engineering 深度分析', topics: ['Prefix复用率92%', '预热调用设计', 'Cache断点算法', '模型Cache差异'], file: '20.html' },
        { num: '21', title: '实现 Skills 系统', topics: ['SKILL.md解析器', '触发匹配', '动态Prompt构建', 'v4 Agent (550行)'], file: '21.html' },
        { num: '22', title: 'Harness 设计模式对比', topics: ['3种Finish模式', 'Meta-Harness演进', 'Arize多模型对比', 'Adaptive Harness'], file: '22.html' },
        { num: '23', title: 'Agent 调试与可观测性', topics: ['3层日志体系', 'Token消耗追踪', '时间线可视化', '可观测性面板'], file: '23.html' },
        { num: '24', title: '性能优化实战', topics: ['Cache命中率调优', '并行工具调用', 'Haiku vs Sonnet', '端到端优化案例'], file: '24.html' },
        { num: '25', title: '社区教程与工具生态', topics: ['国内外教程全景', '开源工具链', '竞品对比', '学习路径推荐'], file: '25.html' },
        { num: '26', title: '前沿趋势：Long-Running Agents', topics: ['Default-FAIL契约', 'Fresh-Context Evaluator', 'Kill Switch/Steering', 'Meta-Harness'], file: '26.html' },
        { num: '27', title: '实战：搭建完整 Coding Agent', topics: ['10步模块集成', 'CLI交互界面', '配置系统', '端到端演示'], file: '27.html' },
        { num: '28', title: '总结与展望', topics: ['28章知识图谱', '9大架构模式速查', '进阶学习方向', 'Agent工程师素养'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
