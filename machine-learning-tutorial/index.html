<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>机器学习 · 从入门到精通 · 课程目录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f5f3ff 0%, #e8f5f0 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🤖";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>机器学习 · 从入门到精通</h1>
        <div class="sub">📘 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '机器学习概述', topics: ['AI/ML/DL关系', '学习类型', 'ML项目流程', '工具栈一览'], file: '01.html' },
        { num: '02', title: '数学基础：线性代数', topics: ['向量矩阵张量', '矩阵乘法', '特征值与PCA', 'SVD与推荐系统'], file: '02.html' },
        { num: '03', title: '数学基础：概率统计', topics: ['概率分布族', '贝叶斯定理', 'MLE与MAP', '统计检验选特征'], file: '03.html' },
        { num: '04', title: '数学基础：优化理论', topics: ['梯度下降三变体', '学习率调度', '凸优化', 'Adam/AdamW'], file: '04.html' },
        { num: '05', title: '数据预处理与探索', topics: ['缺失值处理', '异常值检测', 'EDA黄金流程', '数据泄露防范'], file: '05.html' },
        { num: '06', title: '第一个ML项目实战', topics: ['加州房价预测', 'Pipeline构建', '基线模型', '模型保存'], file: '06.html' },
        { num: '07', title: '模型评估与选择', topics: ['混淆矩阵', '分类/回归指标', '交叉验证', '偏差-方差权衡'], file: '07.html' },
        { num: '08', title: '线性回归与正则化', topics: ['最小二乘法', 'Ridge/Lasso/ElasticNet', 'L1 vs L2几何直觉', '正则化路径'], file: '08.html' },
        { num: '09', title: '逻辑回归与分类', topics: ['Sigmoid函数', '交叉熵损失', 'OvR/OvO/Softmax', '概率校准'], file: '09.html' },
        { num: '10', title: '决策树与随机森林', topics: ['信息增益与Gini', '剪枝策略', 'Bagging集成', 'OOB误差'], file: '10.html' },
        { num: '11', title: '支持向量机 SVM', topics: ['最大间隔分类', '软间隔与C参数', '核技巧', 'gamma调参'], file: '11.html' },
        { num: '12', title: '朴素贝叶斯与KNN', topics: ['三种NB变体', '拉普拉斯平滑', 'K值选择', '维度灾难'], file: '12.html' },
        { num: '13', title: '聚类算法', topics: ['K-Means与肘部法则', 'DBSCAN密度聚类', '层次聚类', '聚类评估'], file: '13.html' },
        { num: '14', title: '降维与特征工程', topics: ['PCA原理', 't-SNE可视化', '特征选择三流派', '目标编码'], file: '14.html' },
        { num: '15', title: '模型调参与AutoML', topics: ['Grid/Random/Bayes搜索', 'Optuna实战', 'AutoGluon', '调参策略'], file: '15.html' },
        { num: '16', title: '处理不平衡数据', topics: ['SMOTE与变体', '类别权重', '异常检测视角', '正确评估指标'], file: '16.html' },
        { num: '17', title: '模型可解释性', topics: ['SHAP值原理', 'LIME局部解释', '部分依赖图', '解释的陷阱'], file: '17.html' },
        { num: '18', title: 'ML系统工程化', topics: ['Pipeline自动化', 'MLflow实验管理', '特征存储', 'MLOps成熟度'], file: '18.html' },
        { num: '19', title: '神经网络基础', topics: ['感知机', '激活函数对比', '反向传播', 'BN/Dropout'], file: '19.html' },
        { num: '20', title: '深度学习框架实战', topics: ['PyTorch基础', 'DataLoader', '训练循环', '混合精度'], file: '20.html' },
        { num: '21', title: 'CNN卷积神经网络', topics: ['卷积与池化', 'ResNet残差连接', '迁移学习', '数据增强'], file: '21.html' },
        { num: '22', title: 'RNN与序列模型', topics: ['LSTM门控机制', 'GRU简化版', 'Seq2Seq架构', 'Attention机制'], file: '22.html' },
        { num: '23', title: 'NLP自然语言处理', topics: ['Word2Vec', 'Transformer', 'BERT预训练', '现代NLP技术栈'], file: '23.html' },
        { num: '24', title: '生成式模型', topics: ['GAN对抗训练', 'VAE潜在空间', 'Diffusion Models', '自回归生成'], file: '24.html' },
        { num: '25', title: '强化学习入门', topics: ['MDP框架', 'Q-Learning', 'DQN经验回放', 'Policy Gradient'], file: '25.html' },
        { num: '26', title: '大语言模型与RAG', topics: ['LLM原理', 'Prompt工程', 'RAG架构', 'LoRA微调'], file: '26.html' },
        { num: '27', title: '模型部署与服务化', topics: ['FastAPI推理服务', 'ONNX优化', 'Docker容器化', '模型监控'], file: '27.html' },
        { num: '28', title: '毕业项目：端到端ML系统', topics: ['电商购买预测', '架构设计', '全链路实现', '进阶路线图'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
