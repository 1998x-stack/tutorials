<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>NLP自然语言处理从入门到精通实战 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f5f3ff 0%, #e8f5f0 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 80, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 200, 240, 0.5);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🧠";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(90, 80, 150, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NLP自然语言处理 · 从入门到精通</h1>
        <div class="sub">🧠 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷 · 从Word2Vec到GPT</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: 'NLP概览', topics: ['发展历史', '三次浪潮', '应用场景', '课程路线图'], file: '01.html' },
        { num: '02', title: '文本预处理', topics: ['分词技术', 'BPE/WordPiece', '文本归一化', '停用词策略'], file: '02.html' },
        { num: '03', title: '语言模型基础', topics: ['N-gram模型', '马尔可夫假设', '平滑技术', '困惑度'], file: '03.html' },
        { num: '04', title: '文本表示', topics: ['词袋模型', 'TF-IDF', 'One-Hot编码', '分布式表示'], file: '04.html' },
        { num: '05', title: '词向量', topics: ['Word2Vec', 'GloVe', 'FastText', '余弦相似度'], file: '05.html' },
        { num: '06', title: '序列模型基础', topics: ['RNN架构', 'BPTT反向传播', '梯度消失', '双向RNN'], file: '06.html' },
        { num: '07', title: 'LSTM与GRU', topics: ['门控机制', '细胞状态', 'LSTM变体', '梯度流分析'], file: '07.html' },
        { num: '08', title: 'Seq2Seq模型', topics: ['Encoder-Decoder', 'Teacher Forcing', '瓶颈问题', 'PyTorch实现'], file: '08.html' },
        { num: '09', title: 'Attention机制', topics: ['Bahdanau Attention', 'Luong Attention', '对齐权重', 'Q/K/V框架'], file: '09.html' },
        { num: '10', title: 'Transformer架构', topics: ['Self-Attention', 'Multi-Head', '位置编码', '残差与LayerNorm'], file: '10.html' },
        { num: '11', title: '预训练词向量', topics: ['ELMo架构', '双向语言模型', '上下文相关', 'ULMFiT'], file: '11.html' },
        { num: '12', title: 'BERT详解', topics: ['Masked LM', 'NSP任务', '输入表示', '微调范式'], file: '12.html' },
        { num: '13', title: 'GPT系列', topics: ['自回归生成', 'GPT-1/2/3', 'Zero-shot能力', 'Scaling Laws'], file: '13.html' },
        { num: '14', title: '文本分类实战', topics: ['TextCNN', '数据集构建', '类别不平衡', 'Focal Loss'], file: '14.html' },
        { num: '15', title: 'NLP评估指标', topics: ['BLEU', 'ROUGE', 'F1/Precision', '人工评估'], file: '15.html' },
        { num: '16', title: '偏见与公平性', topics: ['数据偏见', '公平性指标', '去偏方法', '公平-准确权衡'], file: '16.html' },
        { num: '17', title: '模型可解释性', topics: ['LIME', 'SHAP', 'Attention可视化', '探针任务'], file: '17.html' },
        { num: '18', title: '安全与对齐', topics: ['对抗攻击', '后门攻击', '幻觉问题', '提示注入'], file: '18.html' },
        { num: '19', title: '迁移学习与微调', topics: ['Fine-tuning策略', 'Adapter', 'LoRA', '学习率策略'], file: '19.html' },
        { num: '20', title: '提示工程', topics: ['Prompt设计', 'In-Context Learning', 'Chain-of-Thought', '提示注入'], file: '20.html' },
        { num: '21', title: '检索增强生成', topics: ['RAG架构', '向量数据库', 'Embedding', 'Chunking策略'], file: '21.html' },
        { num: '22', title: '多语言NLP', topics: ['跨语言迁移', 'Multilingual BERT', '低资源语言', '代码切换'], file: '22.html' },
        { num: '23', title: 'HuggingFace生态', topics: ['Transformers库', 'Datasets', 'Tokenizers', 'Model Hub'], file: '23.html' },
        { num: '24', title: '模型训练与优化', topics: ['混合精度', '梯度累积', '分布式训练', 'FlashAttention'], file: '24.html' },
        { num: '25', title: '模型部署', topics: ['ONNX', 'TensorRT', 'vLLM', 'FastAPI服务'], file: '25.html' },
        { num: '26', title: '大模型前沿', topics: ['RLHF', 'DPO', 'Constitutional AI', 'AI Agents'], file: '26.html' },
        { num: '27', title: '多模态大模型', topics: ['CLIP', 'LLaVA', 'Whisper', '多模态融合'], file: '27.html' },
        { num: '28', title: '结业项目', topics: ['迷你Chatbot', '数据收集', 'SFT+DPO', 'Gradio部署'], file: '28.html' }
    ];

    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
</body>
</html>
