<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>HTTP协议从入门到精通实战 · 课程目录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2ff 0%, #dce4f8 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #818cf8;
            padding-bottom: 0.75rem;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #3730a3, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1::before {
            content: "🌐";
            font-size: 2.2rem;
        }

        .header .sub {
            font-size: 1rem;
            background: #eef2ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #3730a3;
            font-weight: 600;
            border: 1px solid #c7d2fe;
            white-space: nowrap;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #818cf8;
            background: #fefefc;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }

        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #6366f1;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #312e81;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }

        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }

        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #eef2ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c7d2fe;
        }

        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #6366f1;
        }

        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c7d2fe;
            padding-top: 0.5rem;
        }

        .card-footer a {
            background: #e0e7ff;
            color: #312e81;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c7d2fe;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .card-footer a::after {
            content: "→";
            font-size: 1rem;
        }

        .card-footer a:hover {
            background: #6366f1;
            border-color: #6366f1;
            color: white;
            transform: scale(1.02);
        }

        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #3730a3;
            background: #eef2ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c7d2fe;
            font-weight: 500;
        }

        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #818cf8, #a78bfa, #6366f1, #60a5fa);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }

        .card:nth-child(6n+1) .chapter-num { background: #6366f1; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #0ea5e9; }
        .card:nth-child(6n+4) .chapter-num { background: #64748b; }
        .card:nth-child(6n+5) .chapter-num { background: #f43f5e; }
        .card:nth-child(6n) .chapter-num { background: #f59e0b; }

        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>HTTP协议 · 从入门到精通</h1>
        <div class="sub">📘 28章 实战体系</div>
    </div>

    <div id="cardContainer" class="course-grid"></div>

    <div class="footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: 'HTTP协议概述', topics: ['发展历史', '客户端-服务器模型', '版本差异速览'], file: '01.html' },
        { num: '02', title: 'URL与资源定位', topics: ['URI/URL/URN', 'URL语法结构', 'URL编码规则'], file: '02.html' },
        { num: '03', title: 'HTTP报文结构', topics: ['请求报文解剖', '响应报文解剖', '头部/消息体'], file: '03.html' },
        { num: '04', title: 'HTTP请求方法', topics: ['GET/POST/PUT/DELETE', '安全性与幂等性', 'HEAD/OPTIONS'], file: '04.html' },
        { num: '05', title: 'HTTP状态码', topics: ['1xx~5xx分类', '常用状态码详解', '状态码选择实践'], file: '05.html' },
        { num: '06', title: 'HTTP头部字段', topics: ['通用头/请求头/响应头', '实体头/自定义头', '大小写与重复'], file: '06.html' },
        { num: '07', title: 'MIME类型与内容协商', topics: ['MIME结构', 'Content-Type', 'Accept系列头'], file: '07.html' },
        { num: '08', title: '连接管理', topics: ['短连接/长连接', 'Keep-Alive', '管线化/连接池'], file: '08.html' },
        { num: '09', title: 'HTTP缓存', topics: ['Cache-Control', 'ETag/Last-Modified', '缓存层级策略'], file: '09.html' },
        { num: '10', title: 'Cookie与会话', topics: ['Set-Cookie/Cookie', 'Session机制', 'SameSite/HttpOnly'], file: '10.html' },
        { num: '11', title: 'HTTP认证', topics: ['Basic/Digest/Bearer', 'OAuth2流程', 'JWT结构'], file: '11.html' },
        { num: '12', title: '跨域资源共享(CORS)', topics: ['同源策略', '预检请求', 'Access-Control头'], file: '12.html' },
        { num: '13', title: '内容编码与传输', topics: ['gzip/brotli压缩', '分块传输', '范围请求/断点续传'], file: '13.html' },
        { num: '14', title: '重定向与URL重写', topics: ['301/302/307/308', 'Nginx rewrite', '重定向循环'], file: '14.html' },
        { num: '15', title: 'HTTPS概述', topics: ['对称/非对称加密', 'TLS握手过程', '证书信任链'], file: '15.html' },
        { num: '16', title: 'TLS深入', topics: ['版本演进', '密码套件', '前向保密/ALPN'], file: '16.html' },
        { num: '17', title: '证书管理', topics: ['DV/OV/EV证书', "Let's Encrypt", '自签名证书'], file: '17.html' },
        { num: '18', title: 'HTTP安全头部', topics: ['HSTS/CSP', 'X-Frame-Options', 'Referrer-Policy'], file: '18.html' },
        { num: '19', title: '代理与网关', topics: ['正向/反向代理', 'X-Forwarded-For', 'CDN原理'], file: '19.html' },
        { num: '20', title: '负载均衡与限流', topics: ['负载均衡算法', 'Nginx upstream', '限流策略'], file: '20.html' },
        { num: '21', title: 'RESTful API设计', topics: ['REST约束', '资源建模', '状态码/HATEOAS'], file: '21.html' },
        { num: '22', title: 'HTTP性能优化', topics: ['请求/体积优化', '资源提示', 'HTTP/2优化差异'], file: '22.html' },
        { num: '23', title: 'HTTP调试工具', topics: ['curl实战', 'DevTools Network', 'Wireshark抓包'], file: '23.html' },
        { num: '24', title: 'Web服务器配置', topics: ['Nginx基础', 'HTTPS配置', '日志分析'], file: '24.html' },
        { num: '25', title: 'HTTP抓包实战', topics: ['抓包环境搭建', '请求分析', '时序图解读'], file: '25.html' },
        { num: '26', title: 'HTTP/2', topics: ['二进制帧层', 'HPACK头部压缩', '服务器推送'], file: '26.html' },
        { num: '27', title: 'HTTP/3 (QUIC)', topics: ['UDP/QUIC基础', '0-RTT连接', '连接迁移'], file: '27.html' },
        { num: '28', title: 'HTTP项目实战', topics: ['Nginx+HTTPS搭建', '安全头部验证', '性能基准测试'], file: '28.html' }
    ];

    const container = document.getElementById('cardContainer');
    if (!container) return;

    container.innerHTML = '';

    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';

        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';

        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;

        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;

        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);

        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);

        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';

        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);

        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
