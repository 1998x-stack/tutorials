<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>后端开发实战 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🖥️";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>后端开发实战</h1>
        <div class="sub">🖥️ 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '后端开发全景图', topics: ['前后端分离', 'API经济', '云原生定义'], file: '01.html' },
        { num: '02', title: '网络协议基础', topics: ['TCP/IP', 'HTTP/1.1→/2→/3', 'DNS'], file: '02.html' },
        { num: '03', title: 'Linux 基础与环境', topics: ['文件系统', '进程管理', 'Shell脚本'], file: '03.html' },
        { num: '04', title: '版本控制与协作', topics: ['Git工作流', '分支策略', 'Code Review'], file: '04.html' },
        { num: '05', title: '编程语言选型', topics: ['Go/Java/Python', '并发模型', '选型决策框架'], file: '05.html' },
        { num: '06', title: '数据结构与算法实战', topics: ['哈希表', 'B+Tree', 'LRU缓存'], file: '06.html' },
        { num: '07', title: '设计模式与架构原则', topics: ['SOLID', 'DDD概要', 'Clean Architecture'], file: '07.html' },
        { num: '08', title: 'RESTful API 设计', topics: ['资源建模', '状态码', '分页与版本'], file: '08.html' },
        { num: '09', title: '认证与授权体系', topics: ['OAuth 2.0', 'OIDC', 'JWT', 'RBAC'], file: '09.html' },
        { num: '10', title: '关系型数据库设计', topics: ['PostgreSQL', '索引优化', '事务隔离'], file: '10.html' },
        { num: '11', title: 'NoSQL 与缓存策略', topics: ['Redis', 'MongoDB', '缓存模式'], file: '11.html' },
        { num: '12', title: '消息队列与事件驱动', topics: ['Kafka', 'RabbitMQ', 'Redis Streams'], file: '12.html' },
        { num: '13', title: 'gRPC 与微服务通信', topics: ['Protobuf', 'Streaming', '服务发现'], file: '13.html' },
        { num: '14', title: 'GraphQL 与 BFF 模式', topics: ['Schema设计', 'DataLoader', 'N+1优化'], file: '14.html' },
        { num: '15', title: '测试策略与质量保障', topics: ['单元/集成/E2E', 'TDD', 'Mock'], file: '15.html' },
        { num: '16', title: '安全攻防实战', topics: ['OWASP Top 10', 'SQL注入', 'XSS/CSRF'], file: '16.html' },
        { num: '17', title: '日志、指标与告警', topics: ['结构化日志', 'Prometheus', 'Grafana'], file: '17.html' },
        { num: '18', title: 'CI/CD 流水线设计', topics: ['GitHub Actions', '构建优化', '部署策略'], file: '18.html' },
        { num: '19', title: 'Docker 深入与实践', topics: ['多阶段构建', '镜像优化', 'Compose'], file: '19.html' },
        { num: '20', title: 'Kubernetes 核心概念', topics: ['Pod/Deployment', 'Service/ConfigMap', 'K8s架构'], file: '20.html' },
        { num: '21', title: 'K8s 网络与存储', topics: ['CNI', 'Service Mesh', 'PV/PVC'], file: '21.html' },
        { num: '22', title: 'K8s 生产运维实战', topics: ['HPA', '资源配额', 'RBAC', '故障演练'], file: '22.html' },
        { num: '23', title: 'GitOps 与声明式运维', topics: ['ArgoCD', 'Flux', 'Helm/Kustomize'], file: '23.html' },
        { num: '24', title: '可观测性进阶', topics: ['分布式追踪', 'eBPF', '服务拓扑'], file: '24.html' },
        { num: '25', title: 'Serverless 与 FaaS', topics: ['AWS Lambda', 'Knative', '冷启动优化'], file: '25.html' },
        { num: '26', title: 'AI 驱动的后端开发', topics: ['LLM API集成', 'RAG架构', '向量数据库'], file: '26.html' },
        { num: '27', title: '云原生前沿技术', topics: ['WebAssembly', 'Dapr', '供应链安全'], file: '27.html' },
        { num: '28', title: '综合实战项目', topics: ['从零搭建微服务', '全链路实战', '课程总结'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
