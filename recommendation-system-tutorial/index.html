<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>推荐系统实战体系 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🤖";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>推荐系统实战体系</h1>
        <div class="sub">🤖 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '推荐系统概览', topics: ['信息过载与推荐诞生', '推荐vs搜索vs广告', '工业级全链路架构', '推荐如何改变产品'], file: '01.html' },
        { num: '02', title: '推荐系统简史', topics: ['协同过滤与矩阵分解时代', 'LR与FM的工业落地', '深度学习全面渗透', 'LLM重塑推荐范式'], file: '02.html' },
        { num: '03', title: '推荐系统的评估体系', topics: ['离线评估指标', '在线指标体系', 'A/B实验设计', '离线/在线一致性'], file: '03.html' },
        { num: '04', title: '协同过滤：推荐的基石', topics: ['UserCF与ItemCF', '相似度计算公式', 'CF的工业死穴', 'Python实现实战'], file: '04.html' },
        { num: '05', title: '矩阵分解与隐语义模型', topics: ['SVD与隐语义直觉', 'ALS交替最小二乘', 'Bias MF偏置项', 'Netflix Prize故事'], file: '05.html' },
        { num: '06', title: '特征工程（上）', topics: ['四类特征体系', '统计特征设计', '特征交叉方法', '特征选择与重要性'], file: '06.html' },
        { num: '07', title: '特征工程（下）', topics: ['实时特征引擎', 'Embedding特征', 'Feature Store设计', '离线/在线一致性'], file: '07.html' },
        { num: '08', title: '从LR到FM：特征交叉的进化', topics: ['逻辑回归的十年', 'FM：隐向量交叉', 'FFM：Field感知', 'FM代码实现'], file: '08.html' },
        { num: '09', title: 'Wide&Deep与DeepFM', topics: ['记忆与泛化结合', 'DeepFM架构解析', '共享Embedding设计', 'PyTorch代码实战'], file: '09.html' },
        { num: '10', title: 'DCN与xDeepFM', topics: ['显式特征交叉', 'DCN-V1/V2进化', 'CIN压缩交互网络', '模型选型指南'], file: '10.html' },
        { num: '11', title: 'DIN：深度兴趣网络', topics: ['自适应兴趣表示', '注意力机制详解', 'Mini-batch正则化', '阿里工业实践'], file: '11.html' },
        { num: '12', title: 'DIEN与序列模型', topics: ['兴趣演化建模', 'AUGRU机制', '序列模型全景', 'SASRec到SIM'], file: '12.html' },
        { num: '13', title: '召回模型（上）：双塔与向量检索', topics: ['双塔架构设计', 'DSSM与YouTube DNN', '向量检索原理', 'Faiss/HNSW实战'], file: '13.html' },
        { num: '14', title: '召回模型（下）：多兴趣与图召回', topics: ['MIND多兴趣网络', 'DeepWalk到PinSAGE', '多路召回策略', '召回融合与去重'], file: '14.html' },
        { num: '15', title: '排序模型深入', topics: ['粗排与精排分工', '知识蒸馏技术', 'GBDT+LR演进', '模型校准问题'], file: '15.html' },
        { num: '16', title: '多任务学习', topics: ['ESMM全空间建模', 'MMOE多门控专家', 'PLE渐进式提取', '多目标跷跷板问题'], file: '16.html' },
        { num: '17', title: '重排与业务规则', topics: ['MMR多样性算法', 'DPP行列式点过程', '业务规则引擎', '打散与混排策略'], file: '17.html' },
        { num: '18', title: '实时推荐系统', topics: ['三条流水线模型', '实时特征引擎', '延迟预算管理', '在线学习真心话'], file: '18.html' },
        { num: '19', title: '冷启动问题', topics: ['用户/物品/系统冷启动', 'Bandit探索利用', '内容理解方案', 'LLM冷启动新思路'], file: '19.html' },
        { num: '20', title: '推荐系统消偏', topics: ['七种偏差全景', '位置偏差与IPW', '流行度偏差', '因果推断纠偏'], file: '20.html' },
        { num: '21', title: '强化学习在推荐中的应用', topics: ['MDP建模推荐', 'Bandit算法家族', '离线策略评估', 'RL落地挑战'], file: '21.html' },
        { num: '22', title: '多模态与内容理解', topics: ['文本/NLP理解', '图像/CLIP理解', '视频理解', '多模态融合实践'], file: '22.html' },
        { num: '23', title: '推荐系统工具链', topics: ['框架选型指南', '特征平台设计', '训练基础设施', '模型部署与监控'], file: '23.html' },
        { num: '24', title: '大模型驱动的新一代推荐', topics: ['LLM as Ranker', 'RAG推荐系统', '对话式推荐', 'Agent推荐ChainRec'], file: '24.html' },
        { num: '25', title: 'LLM推荐的工业实践', topics: ['快手OneRec系列', '阿里LUM大型用户模型', '端侧推理轻量化', '落地路线图'], file: '25.html' },
        { num: '26', title: '前沿趋势盘点', topics: ['生成式推荐', 'Semantic ID', '搜推一体化', '多Agent协同'], file: '26.html' },
        { num: '27', title: '推荐系统架构设计', topics: ['从0到1路线图', '容量规划', '技术选型决策', '团队组织'], file: '27.html' },
        { num: '28', title: '综合实战项目', topics: ['MovieLens全链路', '双塔召回+Faiss', 'DeepFM排序', 'FastAPI在线服务'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
