<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>大模型训练与部署深度分析 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container { display: block; }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🤖";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>大模型训练与部署深度分析</h1>
        <div class="sub">🤖 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从预训练到部署 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '大模型训练全景图', topics: ['LLM三阶段范式', '训练链路概览', '关键挑战', '2026技术趋势'], file: '01.html' },
        { num: '02', title: '预训练数据工程', topics: ['数据采集', '质量过滤', '去重技术', '数据配比'], file: '02.html' },
        { num: '03', title: 'Tokenizer原理与实践', topics: ['BPE算法', 'SentencePiece', '词汇表构建', '分词策略'], file: '03.html' },
        { num: '04', title: 'Transformer架构深度解析', topics: ['Self-Attention', 'SwiGLU FFN', 'RoPE位置编码', 'Pre-Norm vs Post-Norm'], file: '04.html' },
        { num: '05', title: '分布式训练基础', topics: ['数据并行', '模型并行', '通信原语', 'FSDP/ZeRO'], file: '05.html' },
        { num: '06', title: '优化器与学习率调度', topics: ['AdamW', 'Lion/Muon', '学习率调度', '梯度裁剪'], file: '06.html' },
        { num: '07', title: '混合精度与显存优化', topics: ['FP16/BF16/FP8', 'Gradient Checkpointing', 'ZeRO-1/2/3', '显存优化策略'], file: '07.html' },
        { num: '08', title: '3D并行与大规模训练', topics: ['张量并行TP', '流水线并行PP', '3D并行组合', '序列并行与专家并行'], file: '08.html' },
        { num: '09', title: 'MoE混合专家架构', topics: ['稀疏MoE原理', 'Top-K路由', '负载均衡', 'DeepSeekMoE设计'], file: '09.html' },
        { num: '10', title: '训练稳定性与收敛', topics: ['Loss Spike诊断', '梯度裁剪', '归一化策略', 'μP初始化'], file: '10.html' },
        { num: '11', title: 'Scaling Laws与算力规划', topics: ['Chinchilla定律', '计算最优训练', 'FLOPs估算', 'MoE Scaling特性'], file: '11.html' },
        { num: '12', title: '长上下文训练技术', topics: ['RoPE位置插值', 'Ring Attention', '序列并行方案', '百万Token实践'], file: '12.html' },
        { num: '13', title: '合成数据与数据配比', topics: ['合成数据生成', '课程学习', 'DoReMi/DoGE', '工业实践'], file: '13.html' },
        { num: '14', title: 'Mid-training与继续预训练', topics: ['领域适应', '灾难性遗忘', 'CPT策略', '实践案例'], file: '14.html' },
        { num: '15', title: '监督微调(SFT)原理与实践', topics: ['SFT数据构建', '训练配方', '对话模板', '质量vs数量'], file: '15.html' },
        { num: '16', title: 'RLHF与奖励模型', topics: ['奖励模型训练', 'PPO算法', 'Bradley-Terry模型', 'Reward Hacking'], file: '16.html' },
        { num: '17', title: 'DPO与偏好对齐优化', topics: ['DPO推导', 'IPO/KTO/SimPO', 'Online DPO', 'DPO vs PPO选择'], file: '17.html' },
        { num: '18', title: '参数高效微调(PEFT)', topics: ['LoRA原理', 'QLoRA/DoRA', 'GoRA自适应秩', 'PEFT选择指南'], file: '18.html' },
        { num: '19', title: 'RLVR与推理增强技术', topics: ['GRPO算法', 'DeepSeek-R1管线', 'Aha Moment', 'Test-time Compute'], file: '19.html' },
        { num: '20', title: '指令微调与Agent能力', topics: ['Function Calling', '多轮对话训练', 'CoT训练', '工具调用'], file: '20.html' },
        { num: '21', title: '多模态模型训练', topics: ['CLIP对齐', 'LLaVA架构', '视觉编码器', '多模态SFT'], file: '21.html' },
        { num: '22', title: '模型合并与知识蒸馏', topics: ['TIES/DARE合并', '知识蒸馏', '渐进式蒸馏', 'MergeKit实践'], file: '22.html' },
        { num: '23', title: '模型量化技术深度', topics: ['GPTQ/AWQ', 'GGUF格式', 'INT4/INT8/FP8', '量化实践'], file: '23.html' },
        { num: '24', title: '推理优化技术', topics: ['KV Cache管理', '投机解码', 'FlashAttention', 'Continuous Batching'], file: '24.html' },
        { num: '25', title: '推理引擎与服务架构', topics: ['vLLM/SGLang', 'Prefill-Decode分离', 'RTP-LLM', '成本优化'], file: '25.html' },
        { num: '26', title: '端侧部署与边缘推理', topics: ['llama.cpp', 'MNN/MLC-LLM', '端侧量化', '端侧微调'], file: '26.html' },
        { num: '27', title: '集群运维与故障恢复', topics: ['Checkpoint策略', '故障检测', 'FT-HSDP容错', '训练监控'], file: '27.html' },
        { num: '28', title: '从零到一：完整实战项目', topics: ['1B模型预训练', 'SFT+DPO管道', '量化部署', '全链路踩坑总结'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
