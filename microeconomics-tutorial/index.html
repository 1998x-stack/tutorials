<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>微观经济学：从稀缺到均衡 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "📊";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>微观经济学：从稀缺到均衡</h1>
        <div class="sub">📈 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '经济学思维：稀缺与选择', topics: ['稀缺性', '机会成本', '边际思维', '理性人假设'], file: '01.html' },
        { num: '02', title: '经济模型：PPF与比较优势', topics: ['生产可能性边界', '比较优势', '绝对优势', '贸易收益'], file: '02.html' },
        { num: '03', title: '需求曲线：支付意愿与需求定律', topics: ['需求定律', '替代/收入效应', '正常品与劣等品', '吉芬商品'], file: '03.html' },
        { num: '04', title: '供给曲线：成本与供给定律', topics: ['供给定律', '边际成本', '供给移动因素', '短期vs长期'], file: '04.html' },
        { num: '05', title: '市场均衡：价格机制的力量', topics: ['均衡价格', '超额供给/需求', '比较静态分析', '看不见的手'], file: '05.html' },
        { num: '06', title: '弹性：衡量市场反应', topics: ['需求价格弹性', '收入弹性', '交叉弹性', '丰收悖论'], file: '06.html' },
        { num: '07', title: '政府政策：税收、补贴与管制', topics: ['价格上限/下限', '税收归宿', '弹性与税负', '补贴效应'], file: '07.html' },
        { num: '08', title: '消费者选择（上）：效用理论', topics: ['总效用', '边际效用递减', '等边际原则', '钻石与水悖论'], file: '08.html' },
        { num: '09', title: '消费者选择（下）：无差异曲线', topics: ['无差异曲线', '预算约束线', 'MRS递减', '最优消费束'], file: '09.html' },
        { num: '10', title: '收入效应与替代效应', topics: ['替代效应', '收入效应', '希克斯分解', '吉芬商品推导'], file: '10.html' },
        { num: '11', title: '生产函数：投入与产出', topics: ['生产函数', '边际产量', '边际报酬递减', '规模报酬'], file: '11.html' },
        { num: '12', title: '成本分析：会计师 vs 经济学家', topics: ['显性/隐性成本', '经济利润', '短期成本曲线', '沉没成本谬误'], file: '12.html' },
        { num: '13', title: '完全竞争市场（上）：利润最大化', topics: ['价格接受者', 'MR=MC原则', '短期利润最大化', '关停条件'], file: '13.html' },
        { num: '14', title: '完全竞争市场（下）：均衡与效率', topics: ['短期vs长期均衡', '进入与退出', '配置效率', '总剩余最大化'], file: '14.html' },
        { num: '15', title: '垄断：市场势力与价格歧视', topics: ['垄断来源', 'MR<P', '无谓损失', '价格歧视'], file: '15.html' },
        { num: '16', title: '垄断竞争：差异化与广告', topics: ['产品差异化', '过剩产能', '品牌价值', '广告经济学'], file: '16.html' },
        { num: '17', title: '寡头垄断（上）：数量与价格竞争', topics: ['古诺模型', '伯川德模型', '斯塔克伯格', '反应函数'], file: '17.html' },
        { num: '18', title: '寡头垄断（下）：博弈论入门', topics: ['囚徒困境', '纳什均衡', '占优策略', '重复博弈'], file: '18.html' },
        { num: '19', title: '外部性：私人成本与社会成本', topics: ['负/正外部性', '庇古税', '科斯定理', '碳排放治理'], file: '19.html' },
        { num: '20', title: '公共物品与公共资源：集体行动的困境', topics: ['非排他性', '非竞争性', '公地悲剧', '奥斯特罗姆方案'], file: '20.html' },
        { num: '21', title: '信息不对称：逆向选择与道德风险', topics: ['柠檬市场', '逆向选择', '信号发送', '道德风险'], file: '21.html' },
        { num: '22', title: '再分配与税收效率', topics: ['洛伦兹曲线', '基尼系数', '税收超额负担', '最优税制'], file: '22.html' },
        { num: '23', title: '劳动市场与人力资本', topics: ['边际产品价值', '补偿性差异', '人力资本', '超级明星经济'], file: '23.html' },
        { num: '24', title: '行为经济学：心理与决策', topics: ['前景理论', '损失厌恶', '框架效应', '助推Nudge'], file: '24.html' },
        { num: '25', title: '风险、不确定性与保险', topics: ['期望效用', '风险厌恶', '保险原理', '逆向/道德风险'], file: '25.html' },
        { num: '26', title: '平台经济与双边市场', topics: ['网络效应', '双边市场', '平台定价', '多归属'], file: '26.html' },
        { num: '27', title: '人工智能与微观经济学', topics: ['算法定价', '大数据杀熟', 'AI与劳动力', 'LENS框架'], file: '27.html' },
        { num: '28', title: '综合实战：微观经济学分析框架', topics: ['五步分析法', '模型选择', '政策评估', '完整案例'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
