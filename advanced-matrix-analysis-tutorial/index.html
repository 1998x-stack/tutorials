<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>高级矩阵分析 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "📐";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>高级矩阵分析</h1>
        <div class="sub">📐 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从矩阵基础到张量分解 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '矩阵分析导论', topics: ['课程全景图', '历史脉络', '预备知识'], file: '01.html' },
        { num: '02', title: '线性空间与线性变换', topics: ['向量空间公理', '基变换', '秩-零化度定理'], file: '02.html' },
        { num: '03', title: '特殊矩阵与矩阵运算', topics: ['正交/酉矩阵', '正定矩阵', '分块运算', 'Hadamard积'], file: '03.html' },
        { num: '04', title: '范数与内积空间', topics: ['向量范数', '矩阵范数', '对偶范数', '范数等价性'], file: '04.html' },
        { num: '05', title: '特征值与特征向量', topics: ['特征多项式', '谱半径', 'Gershgorin圆盘定理'], file: '05.html' },
        { num: '06', title: '矩阵相似性与Jordan标准形', topics: ['相似不变量', 'Jordan块', '广义特征向量', '实Jordan形'], file: '06.html' },
        { num: '07', title: '矩阵函数', topics: ['Cayley-Hamilton定理', '矩阵指数', '微分方程应用'], file: '07.html' },
        { num: '08', title: 'LU分解与高斯消元法', topics: ['LU分解', 'PLU分解', 'Cholesky分解', '数值稳定性'], file: '08.html' },
        { num: '09', title: 'QR分解', topics: ['Gram-Schmidt', 'Householder变换', 'Givens旋转', '最小二乘'], file: '09.html' },
        { num: '10', title: '特征值分解与谱定理', topics: ['谱定理', 'Rayleigh商', 'Courant-Fischer', '极分解'], file: '10.html' },
        { num: '11', title: '奇异值分解（SVD）', topics: ['SVD几何意义', 'Eckart-Young定理', 'PCA', '图像压缩'], file: '11.html' },
        { num: '12', title: 'Schur分解与广义特征值', topics: ['Schur分解', 'QZ分解', '广义特征值', '矩阵束'], file: '12.html' },
        { num: '13', title: '广义逆矩阵与最小二乘', topics: ['Moore-Penrose伪逆', '最小范数解', 'Tikhonov正则化'], file: '13.html' },
        { num: '14', title: '矩阵扰动理论', topics: ['条件数', 'Weyl定理', 'Davis-Kahan定理', 'Bauer-Fike定理'], file: '14.html' },
        { num: '15', title: '矩阵导数基础', topics: ['布局约定', '标量/向量/矩阵求导', '链式法则', '速查表'], file: '15.html' },
        { num: '16', title: '矩阵微分进阶', topics: ['迹技巧', '行列式导数', '特征值导数', '截断SVD导数'], file: '16.html' },
        { num: '17', title: '矩阵优化方法', topics: ['投影梯度法', '近端梯度法', 'ADMM', '矩阵补全'], file: '17.html' },
        { num: '18', title: '流形上的矩阵优化', topics: ['Stiefel流形', 'Grassmann流形', 'Riemannian梯度下降'], file: '18.html' },
        { num: '19', title: 'Kronecker积与矩阵方程', topics: ['Kronecker积', 'vec算子', 'Sylvester方程', 'Lyapunov方程'], file: '19.html' },
        { num: '20', title: '非负矩阵分解（NMF）', topics: ['乘性更新', 'ALS算法', '主题建模', '深度NMF'], file: '20.html' },
        { num: '21', title: '稀疏表示与压缩感知', topics: ['RIP条件', 'OMP/LASSO', '矩阵补全', '鲁棒PCA'], file: '21.html' },
        { num: '22', title: '随机矩阵理论入门', topics: ['Wigner半圆律', 'Marčenko-Pastur', '随机SVD', '双下降'], file: '22.html' },
        { num: '23', title: '张量代数基础', topics: ['模-n展开', '模-n积', 'Khatri-Rao积', '张量秩'], file: '23.html' },
        { num: '24', title: 'CP分解、Tucker分解与HOSVD', topics: ['CP-ALS', 'Tucker分解', 'HOSVD', '截断HOSVD'], file: '24.html' },
        { num: '25', title: '张量网络与高级分解', topics: ['Tensor-Train', 'Tensor-Ring', '层级Tucker', 'DNN压缩'], file: '25.html' },
        { num: '26', title: '深度学习中的矩阵分析', topics: ['Attention矩阵视角', 'LoRA', '谱归一化', 'PMM'], file: '26.html' },
        { num: '27', title: '矩阵分析前沿趋势', topics: ['深度NMF', '量子矩阵计算', '四元数SVD', '自动微分'], file: '27.html' },
        { num: '28', title: '综合项目实战', topics: ['图像压缩', '推荐系统', 'SVD/NMF实战'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
