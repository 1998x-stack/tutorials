<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Linux 源码分析 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🐧";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>Linux 源码分析</h1>
        <div class="sub">🐧 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: 'Linux的诞生', topics: ['UNIX/MINIX/GNU背景', '从0.00到1.0版本演进', '关键人物与趣闻', '为什么从0.11学起'], file: '01.html' },
        { num: '02', title: '内核架构总览', topics: ['14个源码目录解读', '宏内核vs微内核', '编译产物vmlinux', 'RTFSC读源码方法论'], file: '02.html' },
        { num: '03', title: '开发环境搭建', topics: ['Bochs模拟器安装配置', '内核镜像与磁盘准备', 'bochsrc逐行解读', 'QEMU+GDB备选方案'], file: '03.html' },
        { num: '04', title: '引导启动(上)', topics: ['CPU加电与BIOS流程', 'bootsect.S源码精读', '实模式编程要点', 'INT 0x13踩坑故事'], file: '04.html' },
        { num: '05', title: '引导启动(下)', topics: ['setup.S获取硬件信息', '进入保护模式CR0.PE', 'head.S分页初始化', 'A20门历史包袱'], file: '05.html' },
        { num: '06', title: '内核初始化', topics: ['main.c初始化全景图', '各子系统初始化顺序', 'move_to_user_mode', 'init()第一个进程'], file: '06.html' },
        { num: '07', title: 'x86保护模式精要', topics: ['段描述符与GDT/LDT', 'Ring0-3特权级保护', '两级页表地址翻译', 'TSS硬件任务切换'], file: '07.html' },
        { num: '08', title: '中断与异常', topics: ['x86中断向量表', 'IDT与门描述符', '8259A中断控制器', 'asm.s通用中断入口'], file: '08.html' },
        { num: '09', title: '系统调用', topics: ['int 0x80全流程追踪', 'system_call.s源码', 'sys_call_table调用表', '参数传递与安全拷贝'], file: '09.html' },
        { num: '10', title: '进程调度', topics: ['task_struct数据结构', 'schedule()调度算法', 'switch_to()任务切换', 'jiffies时钟滴答'], file: '10.html' },
        { num: '11', title: '进程生命周期', topics: ['fork()写时复制机制', 'execve()加载程序', 'exit()与wait()回收', '僵尸进程踩坑故事'], file: '11.html' },
        { num: '12', title: '信号机制', topics: ['信号数据结构与位图', '发送/递送/处理流程', 'sigframe用户栈帧', 'sigaction可移植性'], file: '12.html' },
        { num: '13', title: '内存管理(上)', topics: ['物理内存布局分区', 'mem_map页框管理', 'get_free_page分配', '线性地址空间布局'], file: '13.html' },
        { num: '14', title: '内存管理(下)', topics: ['两级页表结构详解', '线性地址翻译示例', 'do_wp_page写时复制', '页表不一致幽灵Bug'], file: '14.html' },
        { num: '15', title: '缓冲区管理', topics: ['buffer_head数据结构', 'LRU缓冲区淘汰策略', 'getblk/brelse源码', 'bread/bwrite块读写'], file: '15.html' },
        { num: '16', title: 'MINIX文件系统(上)', topics: ['磁盘六区布局', '超级块super_block', 'inode结构与寻址', '位图分配/释放算法'], file: '16.html' },
        { num: '17', title: 'MINIX文件系统(下)', topics: ['namei()路径解析', 'file_table与fd映射', '文件读写完整链路', 'open/close引用计数'], file: '17.html' },
        { num: '18', title: '管道与exec', topics: ['管道环形缓冲区实现', 'read_pipe/write_pipe', 'a.out可执行格式', 'shell管道链时序'], file: '18.html' },
        { num: '19', title: '块设备驱动(上)', topics: ['块设备抽象层设计', 'request请求队列', '电梯调度算法', 'll_rw_block读写入口'], file: '19.html' },
        { num: '20', title: '块设备驱动(下)', topics: ['IDE控制器寄存器编程', 'CHS寻址与LBA', '硬盘中断处理流程', 'RAM虚拟盘rd.c'], file: '20.html' },
        { num: '21', title: '字符设备驱动(上)', topics: ['tty三队列模型', 'tty_struct数据结构', '控制台VGA显存操作', '行规程line discipline'], file: '21.html' },
        { num: '22', title: '字符设备驱动(下)', topics: ['键盘扫描码→ASCII', '8042控制器编程', '16550 UART寄存器', '串口中断处理'], file: '22.html' },
        { num: '23', title: '内核调试技术', topics: ['printk日志级别策略', 'Bochs内置调试器', 'Magic SysRq键', '常见内核Bug分类'], file: '23.html' },
        { num: '24', title: 'GDB单步跟踪', topics: ['QEMU+GDB远程调试', '战略断点设置', '跟踪系统调用全程', '内存检查技巧'], file: '24.html' },
        { num: '25', title: '动手写系统调用', topics: ['编写sys_hello函数', '注册系统调用号', '重新编译内核', '用户态测试验证'], file: '25.html' },
        { num: '26', title: '从0.11到1.0', topics: ['0.12虚拟内存与交换', '0.95 VFS框架', '0.98 TCP/IP网络栈', '0.99 4GB线性空间'], file: '26.html' },
        { num: '27', title: '现代内核对比', topics: ['Buddy/Slab/SLUB演进', 'CFS→EEVDF调度器', 'LKM内核模块', 'eBPF/XDP可编程'], file: '27.html' },
        { num: '28', title: '综合项目', topics: ['实现ramdisk驱动', '简单procfs(备选)', '完整开发流程', 'RTFSC开始旅程'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
