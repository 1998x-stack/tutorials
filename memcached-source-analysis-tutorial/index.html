<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 50%, #f8fafc 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.80);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), 0 8px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #6366f1;
            padding-bottom: 0.75rem;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1 .emoji {
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(99, 102, 241, 0.3));
        }

        .header .sub {
            font-size: 1rem;
            background: #eef2ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #4338ca;
            font-weight: 600;
            border: 1px solid #c7d2fe;
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.08);
            white-space: nowrap;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(148, 163, 184, 0.25);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(99, 102, 241, 0.12), 0 4px 12px rgba(79, 70, 229, 0.06);
            border-color: #a5b4fc;
            background: #fefeff;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }

        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #6366f1;
            color: #fff;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            box-shadow: inset 0 -2px 0 #4f46e5;
            min-width: 2.2rem;
            text-align: center;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #1e1b4b;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }

        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }

        .topic-list li {
            font-size: 0.8rem;
            color: #334155;
            background: #f1f5f9;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 1px 2px white;
        }

        .topic-list li::before {
            content: "▸";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #6366f1;
        }

        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #e2e8f0;
            padding-top: 0.5rem;
        }

        .card-footer a {
            background: #e0e7ff;
            color: #3730a3;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c7d2fe;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .card-footer a::after {
            content: "→";
            font-size: 1rem;
            transition: transform 0.1s;
        }

        .card-footer a:hover {
            background: #6366f1;
            border-color: #4f46e5;
            color: #fff;
            box-shadow: 0 4px 8px rgba(99, 102, 241, 0.25);
            transform: scale(1.02);
        }

        .card-footer a:active {
            transform: scale(0.96);
        }

        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #475569;
            background: #f8fafc;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            font-weight: 500;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
        }

        .footer span {
            background: #eef2ff;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            margin: 0 4px;
        }

        .footer .wechat {
            font-weight: 700;
            color: #4338ca;
        }

        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa, #c4b5fd);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }

        /* Alternate chapter badge colors */
        .card:nth-child(6n+1) .chapter-num { background: #f59e0b; color: #78350f; }
        .card:nth-child(6n+2) .chapter-num { background: #10b981; color: #fff; }
        .card:nth-child(6n+3) .chapter-num { background: #6366f1; color: #fff; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; color: #fff; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; color: #fff; }
        .card:nth-child(6n) .chapter-num { background: #8b5cf6; color: #fff; }

        /* Loading / error states */
        .state-msg {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            font-size: 1.1rem;
        }
        .state-msg.error {
            color: #dc2626;
            background: #fef2f2;
            border-radius: 20px;
            margin: 1rem 0;
        }

        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .header .sub { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
            .topic-list li { font-size: 0.7rem; }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><span class="emoji"></span><span class="title-text"></span></h1>
        <div class="sub"></div>
    </div>

    <div id="cardContainer" class="course-grid"></div>

    <div style="text-align:center;">
        <div class="footer"></div>
    </div>
</div>

<script>
    (function() {
        const container = document.getElementById('cardContainer');
        const emojiEl = document.querySelector('.header .emoji');
        const titleEl = document.querySelector('.header .title-text');
        const subEl = document.querySelector('.header .sub');
        const footerEl = document.querySelector('.footer');
        const titleTag = document.querySelector('title');

        function showError(msg) {
            container.innerHTML = '<div class="state-msg error">' + msg + '</div>';
        }

        fetch('courses.json')
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                // Set header
                document.title = data.title + ' · 课程目录';
                emojiEl.textContent = data.emoji;
                titleEl.textContent = data.title;
                subEl.textContent = data.subtitle;
                footerEl.innerHTML = '<span>' + data.chapterCount + '章</span> 实战体系 · 从入门到精通';

                if (!data.chapters || data.chapters.length === 0) {
                    showError('暂无课程数据');
                    return;
                }

                container.innerHTML = '';
                data.chapters.forEach(function(course) {
                    var card = document.createElement('div');
                    card.className = 'card';

                    var headerDiv = document.createElement('div');
                    headerDiv.className = 'card-header';

                    var numSpan = document.createElement('span');
                    numSpan.className = 'chapter-num';
                    numSpan.textContent = course.num;

                    var titleSpan = document.createElement('span');
                    titleSpan.className = 'card-title';
                    titleSpan.textContent = course.title;

                    headerDiv.appendChild(numSpan);
                    headerDiv.appendChild(titleSpan);
                    card.appendChild(headerDiv);

                    if (course.topics && course.topics.length > 0) {
                        var topicUl = document.createElement('ul');
                        topicUl.className = 'topic-list';
                        course.topics.forEach(function(topic) {
                            var li = document.createElement('li');
                            li.textContent = topic;
                            topicUl.appendChild(li);
                        });
                        card.appendChild(topicUl);
                    }

                    var footerDiv = document.createElement('div');
                    footerDiv.className = 'card-footer';
                    var link = document.createElement('a');
                    link.href = course.file;
                    link.textContent = '开始学习 ';
                    footerDiv.appendChild(link);
                    card.appendChild(footerDiv);

                    container.appendChild(card);
                });
            })
            .catch(function(err) {
                showError('课程数据加载失败: ' + err.message + '。请刷新页面重试。');
            });
    })();
</script>

<noscript>
    <div style="background:#fef3c7; padding:1rem; border-radius:20px; text-align:center; color:#92400e;">
        请启用 JavaScript 以浏览课程目录。
    </div>
</noscript>
</body>
</html>
