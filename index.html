<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1998x-stack 教程中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 2rem 1.5rem 3rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2rem 0 1.5rem;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc, #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.8rem;
        }

        header p {
            font-size: 1.15rem;
            color: #94a3b8;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.7;
        }

        header .stats {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        header .stats span {
            background: rgba(129, 140, 248, 0.12);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #a5b4fc;
            border: 1px solid rgba(129, 140, 248, 0.2);
        }

        /* Category section */
        .category {
            margin-bottom: 2.5rem;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(129, 140, 248, 0.2);
        }

        .category-header .cat-emoji {
            font-size: 1.6rem;
        }

        .category-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #c7d2fe;
        }

        .category-header .cat-desc {
            font-size: 0.85rem;
            color: #64748b;
            margin-left: 0.5rem;
        }

        .category-header .cat-count {
            margin-left: auto;
            font-size: 0.8rem;
            background: rgba(129, 140, 248, 0.15);
            padding: 0.15rem 0.7rem;
            border-radius: 20px;
            color: #a5b4fc;
        }

        /* Grid of tutorial cards */
        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 1.3rem 1.4rem;
            transition: all 0.25s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(129, 140, 248, 0.35);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.13);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .card-emoji {
            font-size: 2rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .card-info .desc {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        .card-meta {
            margin-top: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            color: #64748b;
        }

        .card-meta .chapters {
            background: rgba(129, 140, 248, 0.12);
            padding: 0.12rem 0.65rem;
            border-radius: 18px;
            color: #a5b4fc;
            font-weight: 600;
        }

        .card-meta .visit {
            color: #818cf8;
            font-weight: 600;
            transition: color 0.15s;
        }

        .card:hover .card-meta .visit {
            color: #a5b4fc;
        }

        /* Loading / error */
        .state-msg {
            text-align: center;
            padding: 4rem;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .state-msg.error {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.08);
            border-radius: 16px;
            max-width: 500px;
            margin: 2rem auto;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: #475569;
            font-size: 0.9rem;
        }

        footer a {
            color: #818cf8;
            text-decoration: none;
            transition: color 0.15s;
        }

        footer a:hover { color: #a5b4fc; }

        /* Nav */
        .nav-categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
        }

        .nav-categories a {
            font-size: 0.8rem;
            color: #94a3b8;
            text-decoration: none;
            padding: 0.25rem 0.85rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.15s;
        }

        .nav-categories a:hover {
            color: #c7d2fe;
            border-color: rgba(129, 140, 248, 0.3);
            background: rgba(129, 140, 248, 0.08);
        }

        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .tutorial-grid { grid-template-columns: 1fr; }
            header .stats { gap: 0.5rem; }
            .category-header { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 id="mainTitle">1998x-stack 教程中心</h1>
        <p id="mainSubtitle">面向工程师的技术教程合集 — 从入门到精通，实战驱动，踩坑避雷</p>
        <div class="stats" id="statsBar"></div>
    </header>

    <nav class="nav-categories" id="navCategories"></nav>

    <div id="content"></div>

    <footer>
        <p>
            所有教程由 <a href="https://github.com/1998x-stack">1998x-stack</a> 维护 ·
            使用 <a href="https://pages.github.com/">GitHub Pages</a> 发布 ·
            源码托管在 <a href="https://github.com/1998x-stack/tutorials">GitHub</a>
        </p>
        <p style="margin-top:0.3rem;">内容持续更新 · 欢迎学习与分享</p>
    </footer>
</div>

<script>
    (function() {
        var contentEl = document.getElementById('content');
        var navEl = document.getElementById('navCategories');
        var statsEl = document.getElementById('statsBar');
        var titleEl = document.getElementById('mainTitle');
        var subtitleEl = document.getElementById('mainSubtitle');

        function showError(msg) {
            contentEl.innerHTML = '<div class="state-msg error">' + msg + '</div>';
        }

        fetch('tutorials.json')
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                document.title = data.title;
                titleEl.textContent = data.title;
                subtitleEl.textContent = data.subtitle;

                if (!data.categories || data.categories.length === 0) {
                    showError('暂无教程数据');
                    return;
                }

                // Stats
                var totalTutorials = 0;
                var totalChapters = 0;
                data.categories.forEach(function(cat) {
                    cat.tutorials.forEach(function(t) {
                        totalTutorials++;
                        totalChapters += t.chapterCount || 0;
                    });
                });
                statsEl.innerHTML = '<span>' + data.categories.length + ' 个学科分类</span><span>' + totalTutorials + ' 门教程</span><span>' + totalChapters + ' 章内容</span>';

                // Nav
                navEl.innerHTML = '';
                data.categories.forEach(function(cat) {
                    var a = document.createElement('a');
                    a.href = '#' + cat.id;
                    a.textContent = cat.emoji + ' ' + cat.name;
                    navEl.appendChild(a);
                });

                // Content
                var html = '';
                data.categories.forEach(function(cat) {
                    html += '<section class="category" id="' + cat.id + '">';
                    html += '<div class="category-header">';
                    html += '<span class="cat-emoji">' + cat.emoji + '</span>';
                    html += '<h2>' + cat.name + '</h2>';
                    html += '<span class="cat-desc">' + cat.description + '</span>';
                    html += '<span class="cat-count">' + cat.tutorials.length + ' 门课程</span>';
                    html += '</div>';
                    html += '<div class="tutorial-grid">';

                    cat.tutorials.forEach(function(t) {
                        html += '<a class="card" href="' + t.url + '" target="_blank" rel="noopener">';
                        html += '<div class="card-top">';
                        html += '<span class="card-emoji">' + t.emoji + '</span>';
                        html += '<div class="card-info">';
                        html += '<h3>' + t.title + '</h3>';
                        html += '<div class="desc">' + t.description + '</div>';
                        html += '</div>';
                        html += '</div>';
                        html += '<div class="card-meta">';
                        html += '<span class="chapters">' + t.chapterCount + ' 章</span>';
                        html += '<span class="visit">进入教程 →</span>';
                        html += '</div>';
                        html += '</a>';
                    });

                    html += '</div>';
                    html += '</section>';
                });

                contentEl.innerHTML = html;
            })
            .catch(function(err) {
                showError('教程数据加载失败: ' + err.message + '。请刷新页面重试。');
            });
    })();
</script>

<noscript>
    <div style="background:#fef3c7; padding:1.5rem; border-radius:16px; text-align:center; color:#92400e; max-width:500px; margin:2rem auto;">
        请启用 JavaScript 以浏览教程目录。部分内容仍需脚本支持。
    </div>
</noscript>
</body>
</html>
