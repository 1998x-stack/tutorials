<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>统计学 · 从入门到精通 · 课程目录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f3ff 0%, #e8f5f0 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "📊";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>统计学 · 从入门到精通</h1>
        <div class="sub">📘 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '什么是统计学', topics: ['统计学的定义', '描述vs推断', '总体与样本', '变量类型'], file: '01.html' },
        { num: '02', title: '数据的类型与来源', topics: ['定性vs定量', '离散vs连续', '横截面vs时间序列', '抽样方法'], file: '02.html' },
        { num: '03', title: '描述统计（一）', topics: ['均值', '中位数', '众数', '方差与标准差'], file: '03.html' },
        { num: '04', title: '描述统计（二）', topics: ['百分位数', '箱线图', '偏度与峰度', '数据标准化'], file: '04.html' },
        { num: '05', title: '数据可视化基础', topics: ['直方图', '散点图', '条形图', '可视化误区'], file: '05.html' },
        { num: '06', title: '概率基础', topics: ['古典概率', '条件概率', '贝叶斯公式', '随机变量'], file: '06.html' },
        { num: '07', title: '常见概率分布', topics: ['二项分布', '泊松分布', '正态分布', '中心极限定理'], file: '07.html' },
        { num: '08', title: '抽样与抽样分布', topics: ['简单随机抽样', '分层抽样', '抽样分布', '标准误'], file: '08.html' },
        { num: '09', title: '点估计与区间估计', topics: ['矩估计', '最大似然', '置信区间', '误差边界'], file: '09.html' },
        { num: '10', title: '假设检验入门', topics: ['零假设', '备择假设', 'p值', '显著性水平'], file: '10.html' },
        { num: '11', title: '常见假设检验', topics: ['z检验', 't检验', '卡方检验', 'F检验'], file: '11.html' },
        { num: '12', title: '统计功效与样本量', topics: ['Type I/II错误', '功效分析', '效应量', '样本量计算'], file: '12.html' },
        { num: '13', title: '相关分析', topics: ['Pearson相关', 'Spearman相关', '相关矩阵', '相关≠因果'], file: '13.html' },
        { num: '14', title: '简单线性回归', topics: ['最小二乘法', 'R²', '残差分析', '回归诊断'], file: '14.html' },
        { num: '15', title: 'p值与显著性危机', topics: ['p-hacking', 'HARKing', '文件抽屉问题', '可重复性危机'], file: '15.html' },
        { num: '16', title: '多重比较与谬误', topics: ['Bonferroni校正', 'FDR', '辛普森悖论', '幸存者偏差'], file: '16.html' },
        { num: '17', title: '因果推断基础', topics: ['混杂变量', '工具变量', 'DAG', 'RCT'], file: '17.html' },
        { num: '18', title: '统计伦理与最佳实践', topics: ['数据造假', '选择性报告', '预注册', '开放科学'], file: '18.html' },
        { num: '19', title: '多元线性回归', topics: ['多元回归', '共线性', '交互项', 'AIC/BIC'], file: '19.html' },
        { num: '20', title: '逻辑回归', topics: ['odds与logit', '二分类', 'ROC曲线', '混淆矩阵'], file: '20.html' },
        { num: '21', title: '方差分析（ANOVA）', topics: ['单因素ANOVA', '双因素ANOVA', '交互效应', '事后检验'], file: '21.html' },
        { num: '22', title: '贝叶斯统计入门', topics: ['先验与后验', 'MCMC', '贝叶斯vs频率学派', 'AI时代的贝叶斯'], file: '22.html' },
        { num: '23', title: '统计学工具链', topics: ['Python scipy.stats', 'statsmodels', 'R基础', 'Jupyter'], file: '23.html' },
        { num: '24', title: '真实数据分析实战', topics: ['数据清洗', 'EDA', '建模', '报告全流程'], file: '24.html' },
        { num: '25', title: 'A/B测试实战', topics: ['实验设计', '样本量计算', '显著性检验', '决策规则'], file: '25.html' },
        { num: '26', title: '机器学习中的统计学', topics: ['偏差-方差权衡', '正则化', '交叉验证', '贝叶斯优化'], file: '26.html' },
        { num: '27', title: '现代因果推断', topics: ['倾向得分匹配', 'DID', '断点回归', '工具变量'], file: '27.html' },
        { num: '28', title: '综合项目：从问题到结论', topics: ['选题', '研究设计', '数据分析', '报告撰写'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
