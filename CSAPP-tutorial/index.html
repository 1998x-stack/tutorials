<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>深入理解计算机系统（CSAPP） · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "💻";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>深入理解计算机系统（CSAPP）</h1>
        <div class="sub">💻 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '计算机系统漫游', topics: ['hello程序的一生', '硬件组成与存储层次', '操作系统三大抽象', 'Amdahl定律'], file: '01.html' },
        { num: '02', title: '信息的表示与处理——整数', topics: ['大小端字节序', '补码编码', '有符号/无符号转换', '整数溢出与安全'], file: '02.html' },
        { num: '03', title: '信息的表示与处理——浮点数', topics: ['IEEE 754格式', '规格化与非规格化', '舍入策略', '0.1+0.2≠0.3揭秘'], file: '03.html' },
        { num: '04', title: '程序的机器级表示——基础', topics: ['x86-64寄存器全景', '数据传送与算术指令', 'lea指令妙用', '寻址模式详解'], file: '04.html' },
        { num: '05', title: '程序的机器级表示——控制流', topics: ['条件码寄存器', '条件跳转与CMP/TEST', 'if-else/switch实现', '循环的三种汇编模式'], file: '05.html' },
        { num: '06', title: '程序的机器级表示——过程与栈', topics: ['栈帧结构详解', 'call/ret微操作', 'x86-64调用惯例', '递归的栈行为'], file: '06.html' },
        { num: '07', title: '程序的机器级表示——数据与进阶', topics: ['数组与指针的汇编', '结构体对齐与填充', '缓冲区溢出原理', '栈金丝雀与ROP防御'], file: '07.html' },
        { num: '08', title: '处理器体系结构——ISA设计', topics: ['Y86-64指令集', 'HCL硬件控制语言', 'SEQ顺序处理器', 'CISC vs RISC设计哲学'], file: '08.html' },
        { num: '09', title: '处理器体系结构——流水线', topics: ['流水线原理与性能', '数据冒险与转发', '控制冒险与分支预测', 'Spectre/Meltdown背景'], file: '09.html' },
        { num: '10', title: '优化程序性能', topics: ['CPE性能度量', '编译器优化与局限', '代码移动与循环展开', '指令级并行利用'], file: '10.html' },
        { num: '11', title: '存储器层次结构——技术', topics: ['SRAM/DRAM/SSD对比', '时间与空间局部性', '存储山实验', 'SSD写放大陷阱'], file: '11.html' },
        { num: '12', title: '存储器层次结构——Cache', topics: ['缓存组织结构(S/E/B)', '直接映射/组相联', '缓存未命中三类型', '分块矩阵乘法优化'], file: '12.html' },
        { num: '13', title: '链接——静态链接', topics: ['ELF目标文件格式', '符号与符号表', '静态库与ar工具', '强符号与弱符号陷阱'], file: '13.html' },
        { num: '14', title: '链接——动态链接', topics: ['共享库(.so)机制', 'GOT与PLT延迟绑定', '位置无关代码(PIC)', 'LD_PRELOAD插桩技术'], file: '14.html' },
        { num: '15', title: '异常控制流——异常与进程', topics: ['异常四种分类', 'fork写时复制', 'execve加载程序', '孤儿与僵尸进程'], file: '15.html' },
        { num: '16', title: '异常控制流——信号', topics: ['信号发送与接收', '信号处理函数安全写法', 'sigaction与信号阻塞', 'setjmp/longjmp跳转'], file: '16.html' },
        { num: '17', title: '虚拟内存——地址翻译', topics: ['虚拟寻址的动机', '多级页表结构', 'TLB翻译后备缓冲', '缺页与Demand Paging'], file: '17.html' },
        { num: '18', title: '虚拟内存——内存分配', topics: ['mmap与munmap', '显式分配器设计策略', '碎片问题与合并', 'GC标记清除算法'], file: '18.html' },
        { num: '19', title: '系统级I/O', topics: ['Unix I/O模型与FD', 'open/read/write调用', 'I/O重定向(dup2)', 'RIO鲁棒I/O包设计'], file: '19.html' },
        { num: '20', title: '网络编程——基础', topics: ['TCP/IP协议栈', '套接字接口详解', 'HTTP请求响应格式', 'getaddrinfo协议编程'], file: '20.html' },
        { num: '21', title: '网络编程——进阶', topics: ['迭代/并发服务器模型', 'CGI动态内容生成', 'select I/O多路复用', '网络调试工具链'], file: '21.html' },
        { num: '22', title: '并发编程——线程基础', topics: ['线程vs进程对比', 'Pthreads API', '竞态条件与互斥锁', '条件变量与生产者消费者'], file: '22.html' },
        { num: '23', title: '并发编程——高阶模式', topics: ['读写锁(rwlock)', '线程池设计与实现', '死锁预防与诊断', 'Helgrind/TSan调试'], file: '23.html' },
        { num: '24', title: '经典Lab实战(I)', topics: ['Data Lab位运算挑战', 'Bomb Lab GDB拆弹', 'Attack Lab缓冲区攻击'], file: '24.html' },
        { num: '25', title: '经典Lab实战(II)', topics: ['Cache Lab缓存模拟', 'Shell Lab进程管理', 'Malloc Lab分配器'], file: '25.html' },
        { num: '26', title: '经典Lab实战(III)——Proxy Lab', topics: ['并发Web代理架构', '生产者消费者模型', 'HTTP缓存层实现', 'ab压测性能调优'], file: '26.html' },
        { num: '27', title: '现代系统新趋势', topics: ['RISC-V开放指令集', 'GPU异构计算CUDA', 'eBPF内核可编程', 'CXL新型互联技术'], file: '27.html' },
        { num: '28', title: '综合项目：手写高性能Web服务器', topics: ['epoll事件驱动架构', '线程池+任务队列', 'HTTP Keep-Alive', 'wrk压测与性能调优'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
