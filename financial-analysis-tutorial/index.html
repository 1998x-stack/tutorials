<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>金融分析实战体系 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "💹";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>金融分析实战体系</h1>
        <div class="sub">💹 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '金融分析概述', topics: ['金融分析定义', '三大流派', 'CFA框架', '2026工具栈'], file: '01.html' },
        { num: '02', title: '金融市场基础', topics: ['市场分类', '交易品种', '市场参与者', 'A股交易规则'], file: '02.html' },
        { num: '03', title: '财务报表基础', topics: ['三张报表', '会计恒等式', 'IFRS vs CAS', '报表勾稽关系'], file: '03.html' },
        { num: '04', title: '资产负债表分析', topics: ['资产质量', '负债结构', '所有者权益', '营运资本'], file: '04.html' },
        { num: '05', title: '利润表分析', topics: ['收入质量', '费用结构', '利润层次', 'EPS计算'], file: '05.html' },
        { num: '06', title: '现金流量表分析', topics: ['三大现金流', '自由现金流', '现金转换周期', '盈利质量'], file: '06.html' },
        { num: '07', title: '财务比率分析', topics: ['五大比率体系', '效率与流动性', '杠杆与盈利', '行业对标'], file: '07.html' },
        { num: '08', title: 'DuPont分析与ROE', topics: ['三因子分解', '五因子分解', 'ROE驱动因素', '行业差异'], file: '08.html' },
        { num: '09', title: '估值方法概述', topics: ['估值哲学', '绝对vs相对', '方法选择框架', '常见误区'], file: '09.html' },
        { num: '10', title: 'DCF绝对估值法', topics: ['FCFF/FCFE', 'WACC计算', '终值估算', '敏感性分析'], file: '10.html' },
        { num: '11', title: '相对估值法', topics: ['PE深度解析', 'PB/PS/EV乘数', '可比公司', 'PEG修正'], file: '11.html' },
        { num: '12', title: '技术分析基础', topics: ['三大假设', 'K线形态', '趋势线', '成交量验证'], file: '12.html' },
        { num: '13', title: '技术指标详解', topics: ['MA/MACD', 'RSI/KDJ', '布林带', '多重时间框架'], file: '13.html' },
        { num: '14', title: '宏观经济分析', topics: ['经济周期', 'GDP/CPI/PMI', '货币政策', '美林时钟'], file: '14.html' },
        { num: '15', title: '风险管理基础', topics: ['风险分类', 'VaR/CVaR', '压力测试', '回撤管理'], file: '15.html' },
        { num: '16', title: '投资组合理论', topics: ['马科维茨', 'CAPM/Beta', '风险平价', '绩效归因'], file: '16.html' },
        { num: '17', title: '策略回测体系', topics: ['回测框架', '绩效指标', '过拟合陷阱', '实盘差距'], file: '17.html' },
        { num: '18', title: '行为金融学', topics: ['认知偏差', '前景理论', '市场异象', '逆向思维'], file: '18.html' },
        { num: '19', title: '多因子模型', topics: ['Fama-French', '因子构造', 'Alpha研究', '因子拥挤'], file: '19.html' },
        { num: '20', title: '衍生品定价', topics: ['期权期货', 'BS模型', '希腊字母', '波动率曲面'], file: '20.html' },
        { num: '21', title: '固定收益分析', topics: ['债券定价', '收益率曲线', '久期凸性', '信用利差'], file: '21.html' },
        { num: '22', title: '另类数据分析', topics: ['ESG评分', 'NLP舆情', '卫星数据', '数据陷阱'], file: '22.html' },
        { num: '23', title: 'Python金融工具链', topics: ['pandas/Polars', 'akshare/yfinance', 'TA-Lib', '性能对比'], file: '23.html' },
        { num: '24', title: 'Excel高级建模', topics: ['Python-in-Excel', '三表联动', '情景分析', 'Monte Carlo'], file: '24.html' },
        { num: '25', title: '可视化与仪表盘', topics: ['金融图表类型', 'Plotly交互', 'Power BI', 'Streamlit'], file: '25.html' },
        { num: '26', title: 'AI与量化投资', topics: ['LLM策略生成', 'MCP协议', 'Agent分析', 'AI风险边界'], file: '26.html' },
        { num: '27', title: '综合实战项目', topics: ['端到端策略', '因子选股', '组合管理', '绩效归因'], file: '27.html' },
        { num: '28', title: '职业路径与资源', topics: ['CFA/FRM/CQF', '学习路线', '开源生态', '求职市场'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
