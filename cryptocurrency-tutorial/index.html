<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>比特币与加密货币 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🪙";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>比特币与加密货币</h1>
        <div class="sub">🪙 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '货币的演化', topics: ['从贝壳到黄金', '金本位崩溃', '中本聪白皮书', '数字稀缺性'], file: '01.html' },
        { num: '02', title: '比特币白皮书', topics: ['点对点电子现金', '双重支付问题', '时间戳服务器', 'UTXO交易模型'], file: '02.html' },
        { num: '03', title: '密码学基础', topics: ['SHA-256哈希', '非对称加密', 'ECDSA签名', '密码学在BTC中的应用'], file: '03.html' },
        { num: '04', title: '区块链是什么', topics: ['区块结构解剖', '链式防篡改', 'Merkle树', '创世区块'], file: '04.html' },
        { num: '05', title: '去中心化共识', topics: ['拜占庭将军问题', '工作量证明', '最长链规则', '51%攻击'], file: '05.html' },
        { num: '06', title: '比特币网络', topics: ['节点类型与角色', 'P2P网络协议', '交易生命周期', '运行全节点'], file: '06.html' },
        { num: '07', title: '第一次比特币交易', topics: ['选择钱包', '创建与备份', '获取第一笔BTC', '区块链浏览器'], file: '07.html' },
        { num: '08', title: '交易深入', topics: ['UTXO模型', '交易结构详解', '交易费计算', 'Coinbase交易'], file: '08.html' },
        { num: '09', title: '脚本与锁定', topics: ['Bitcoin Script', 'P2PKH标准交易', '多重签名P2SH', 'Taproot P2TR'], file: '09.html' },
        { num: '10', title: '密钥与地址', topics: ['私钥本质', '公钥生成', '地址格式演进', 'HD钱包与BIP39'], file: '10.html' },
        { num: '11', title: '挖矿原理', topics: ['挖矿是什么', '哈希运算核心', 'ASIC演进', '难度调整'], file: '11.html' },
        { num: '12', title: '挖矿经济学', topics: ['区块奖励减半', '交易费市场', '矿工博弈行为', '全球挖矿版图'], file: '12.html' },
        { num: '13', title: '软分叉与硬分叉', topics: ['分叉类型', 'SegWit案例', 'BCH/BSV分裂', 'Taproot升级'], file: '13.html' },
        { num: '14', title: '比特币改进提案', topics: ['BIP流程', '里程碑BIP', 'OP_CTV讨论', '比特币治理哲学'], file: '14.html' },
        { num: '15', title: '钱包安全', topics: ['热钱包vs冷钱包', '硬件钱包深入', '社交工程攻击', 'Bybit案例'], file: '15.html' },
        { num: '16', title: '交易安全', topics: ['地址验证最佳实践', '手续费陷阱RBF', '地址投毒攻击', '智能合约授权风险'], file: '16.html' },
        { num: '17', title: '助记词与备份', topics: ['BIP39助记词', '备份介质对比', 'Shamir秘密共享', '遗产规划'], file: '17.html' },
        { num: '18', title: '隐私与匿名', topics: ['假名性vs匿名性', '链上追踪技术', 'CoinJoin隐私增强', '隐私最佳实践'], file: '18.html' },
        { num: '19', title: '以太坊与智能合约', topics: ['EVM与图灵完备', 'Solidity入门', 'ERC-20标准', '以太坊vs比特币'], file: '19.html' },
        { num: '20', title: 'DeFi去中心化金融', topics: ['AMM自动做市商', '借贷协议', '稳定币生态', 'DeFi风险全景'], file: '20.html' },
        { num: '21', title: 'Layer 2扩容', topics: ['扩容三难困境', '闪电网络深度', 'Rollup技术', 'Taproot Assets'], file: '21.html' },
        { num: '22', title: 'NFT与资产代币化', topics: ['ERC-721标准', 'NFT应用场景', '比特币Ordinals', '现实资产RWA'], file: '22.html' },
        { num: '23', title: '交易所与交易', topics: ['CEX订单簿', 'KYC与合规', 'DEX与AMM', 'DCA定投策略'], file: '23.html' },
        { num: '24', title: '链上数据分析', topics: ['区块链浏览器', 'Mempool监控', '关键链上指标', 'Dune Analytics'], file: '24.html' },
        { num: '25', title: '动手：部署一个代币', topics: ['MetaMask & 测试网', 'Remix IDE', '编写ERC-20', '代币交互'], file: '25.html' },
        { num: '26', title: '监管与合规', topics: ['CLARITY Act', '全球监管对比', 'KYC/AML规则', '加密货币税务'], file: '26.html' },
        { num: '27', title: '前沿趋势', topics: ['比特币生态爆发', 'AI+区块链', '机构化浪潮', '2026-2030展望'], file: '27.html' },
        { num: '28', title: '综合项目', topics: ['区块与链实现', 'PoW挖矿', '交易与签名', 'P2P网络'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
