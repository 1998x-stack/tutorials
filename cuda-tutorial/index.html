<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>CUDA 并行计算编程实战 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🖥️";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>CUDA 并行计算编程实战</h1>
        <div class="sub">🖥️ 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: 'GPU计算的前世今生', topics: ['GPU演进史', 'GPGPU时代', 'CUDA诞生', '现代CUDA全景'], file: '01.html' },
        { num: '02', title: 'CUDA编程环境搭建', topics: ['Toolkit安装', 'nvcc编译器', '设备查询', 'CMake集成'], file: '02.html' },
        { num: '03', title: 'GPU硬件架构概览', topics: ['SM内部结构', '内存层次', '计算能力', 'Tensor Core'], file: '03.html' },
        { num: '04', title: '第一个CUDA内核', topics: ['__global__', '启动配置', '错误检查', '编译流程'], file: '04.html' },
        { num: '05', title: '线程层次结构', topics: ['Grid/Block/Thread', '1D/2D/3D索引', 'Block大小选择', '网格跨度循环'], file: '05.html' },
        { num: '06', title: '内存模型基础', topics: ['内存类型总览', '全局内存', '寄存器与局部', '统一内存入门'], file: '06.html' },
        { num: '07', title: '同步机制入门', topics: ['__syncthreads', '条件分支陷阱', 'Host-Device同步', '异步执行'], file: '07.html' },
        { num: '08', title: '共享内存深入', topics: ['Bank Conflict', '内存填充', '分块矩阵乘法', '动态共享内存'], file: '08.html' },
        { num: '09', title: '全局内存优化', topics: ['合并访问', 'AoS vs SoA', '对齐要求', '向量化加载'], file: '09.html' },
        { num: '10', title: '常量内存与纹理内存', topics: ['常量缓存', '纹理内存', '只读缓存', '空间局部性'], file: '10.html' },
        { num: '11', title: '原子操作与并行规约', topics: ['原子操作类型', '并行规约算法', 'Warp Shuffle', '混合精度原子'], file: '11.html' },
        { num: '12', title: 'CUDA流与并发', topics: ['默认流陷阱', '显式流', '计算传输重叠', '流优先级'], file: '12.html' },
        { num: '13', title: '事件与性能计时', topics: ['cudaEvent计时', '计时误区', 'GPU vs CPU计时', '基准测试实践'], file: '13.html' },
        { num: '14', title: 'Warp级别编程', topics: ['Warp投票函数', 'Shuffle指令', 'Cooperative Groups', 'WMMA入门'], file: '14.html' },
        { num: '15', title: '性能分析工具', topics: ['Nsight Systems', 'Nsight Compute', 'Roofline模型', 'Occupancy分析'], file: '15.html' },
        { num: '16', title: '调试与错误处理', topics: ['compute-sanitizer', 'cuda-gdb', 'Bug分类排查', '错误处理宏'], file: '16.html' },
        { num: '17', title: '性能优化方法论', topics: ['APOD循环', '瓶颈定位', 'Occupancy调优', '优化检查清单'], file: '17.html' },
        { num: '18', title: 'CUDA库生态', topics: ['cuBLAS', 'cuFFT', 'Thrust', 'CUTLASS'], file: '18.html' },
        { num: '19', title: 'CUDA Graph', topics: ['图构建方式', '实例化执行', '图更新重捕获', '适用场景'], file: '19.html' },
        { num: '20', title: '多GPU编程', topics: ['GPU拓扑结构', 'P2P访问', 'NCCL入门', '并行模式'], file: '20.html' },
        { num: '21', title: '动态并行', topics: ['内核启动内核', '嵌套并行', '限制与开销', '适用条件'], file: '21.html' },
        { num: '22', title: 'Cooperative Groups', topics: ['线程组概念', 'Grid级同步', 'Multi-Grid', 'CG实战模式'], file: '22.html' },
        { num: '23', title: 'Nsight工具深度实战', topics: ['NVTX插桩', '高级指标解读', 'VSE调试', 'Nsight Python'], file: '23.html' },
        { num: '24', title: '踩坑集锦与调试案例', topics: ['非合并访问', 'Bank Conflict', '默认流串行化', '未初始化内存'], file: '24.html' },
        { num: '25', title: '性能调优实战', topics: ['规约5版迭代', '矩阵乘法全流程', 'APOD实战', '性能天花板'], file: '25.html' },
        { num: '26', title: 'CUDA 13.x新特性', topics: ['Tile编程', 'CUDA Python 1.0', 'CompileIQ', 'Green Contexts'], file: '26.html' },
        { num: '27', title: 'GPU计算未来趋势', topics: ['Rubin架构', 'HIP跨平台', 'AI编译器', '异构计算'], file: '27.html' },
        { num: '28', title: '综合项目：手写高性能GEMM', topics: ['朴素实现', '共享内存分块', 'Warp优化', 'cuBLAS对比'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
