<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>分布式系统实战 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #3b82f6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e3a5f, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🌐";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #f8fafc;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #1e40af;
            font-weight: 600;
            border: 1px solid #93c5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #93c5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #475569;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+3) .chapter-num { background: #475569; }
        .card:nth-child(6n+4) .chapter-num { background: #1e40af; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #1e3a5f;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #1e293b;
            background: #f0f4f8;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #cbd5e1;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #3b82f6;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #cbd5e1;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #e2e8f0;
            color: #1e3a5f;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #cbd5e1;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #1e40af;
            background: #f0f4f8;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #93c5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #475569, #3b82f6, #1e40af, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>分布式系统实战</h1>
        <div class="sub">🌐 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '什么是分布式系统', topics: ['定义与特征', '集中式vs分布式', '透明性原则', 'Fallacies of Distributed Computing'], file: '01.html' },
        { num: '02', title: '系统模型与时间', topics: ['同步/异步/部分同步模型', '逻辑时钟(Lamport)', '向量时钟', '全局状态快照'], file: '02.html' },
        { num: '03', title: 'CAP定理与取舍', topics: ['CAP三选二', 'PACELC扩展', 'BASE理论', '现实系统的CAP权衡'], file: '03.html' },
        { num: '04', title: '一致性模型', topics: ['强/顺序/因果/最终一致性', '线性一致性', 'CRDT数据结构', '一致性谱系图'], file: '04.html' },
        { num: '05', title: '通信基础', topics: ['OSI七层模型', 'TCP/UDP对比', '网络延迟与带宽', 'Nagle算法'], file: '05.html' },
        { num: '06', title: '序列化与编解码', topics: ['JSON/Protobuf/Thrift/Avro', 'Schema演化', '零拷贝技术', 'Protobuf深度解析'], file: '06.html' },
        { num: '07', title: '分布式系统设计模式', topics: ['服务发现', '负载均衡', '熔断器', '重试与幂等'], file: '07.html' },
        { num: '08', title: 'RPC远程过程调用', topics: ['存根/骨架', '序列化', 'RPC vs 本地调用', 'gRPC实战'], file: '08.html' },
        { num: '09', title: '消息队列与事件驱动', topics: ['Pub/Sub模式', 'Kafka架构', '消息可靠性', '消费者组'], file: '09.html' },
        { num: '10', title: 'P2P与Gossip协议', topics: ['对等网络', 'Gossip传播', 'SWIM故障检测', '一致性哈希'], file: '10.html' },
        { num: '11', title: '服务网格', topics: ['Sidecar模式', 'Envoy/Istio架构', 'xDS协议', 'mTLS'], file: '11.html' },
        { num: '12', title: '网络协议栈深度', topics: ['HTTP/2', 'QUIC', 'WebSocket对比', 'TCP拥塞控制(BBR/CUBIC)'], file: '12.html' },
        { num: '13', title: '组通信与广播', topics: ['原子广播', '全序广播', 'Zab/Zookeeper', '虚拟同步'], file: '13.html' },
        { num: '14', title: '2026通信前沿', topics: ['MRC多路径可靠连接', 'DMSC内容寻址', '空芯光纤', 'CPO共封装光学'], file: '14.html' },
        { num: '15', title: '复制与一致性', topics: ['主从/多主/无主复制', '同步vs异步复制', '读写延迟权衡', 'Quorum机制'], file: '15.html' },
        { num: '16', title: '分布式事务', topics: ['2PC/3PC协议', 'TCC/Saga模式', 'XA事务的陷阱', '最终一致性实践'], file: '16.html' },
        { num: '17', title: 'Raft共识算法', topics: ['Leader选举', '日志复制', '安全保证', '成员变更'], file: '17.html' },
        { num: '18', title: 'Paxos与BFT', topics: ['Basic/Multi-Paxos', 'PBFT', 'HotStuff', 'Gatling并行共识'], file: '18.html' },
        { num: '19', title: '并行计算模型', topics: ['BSP模型', '超级步', 'A-BSP', '计算-通信重叠'], file: '19.html' },
        { num: '20', title: '数据并行', topics: ['AllReduce', 'Ring-AllReduce', '参数服务器', '梯度同步'], file: '20.html' },
        { num: '21', title: '模型与流水线并行', topics: ['张量并行', '流水线并行', 'GPipe', '1F1B调度', 'Megatron'], file: '21.html' },
        { num: '22', title: '分布式训练实战', topics: ['FSDP', 'ZeRO优化', '混合精度', '梯度累积', 'PyTorch DDP'], file: '22.html' },
        { num: '23', title: 'Docker与K8s编排', topics: ['容器化原理', 'Pod', 'Service', 'Ingress', 'ConfigMap/Secret'], file: '23.html' },
        { num: '24', title: '可观测性', topics: ['分布式追踪(Jaeger)', '指标(Prometheus)', '日志(ELK)', 'W3C Trace Context'], file: '24.html' },
        { num: '25', title: '调试与压测', topics: ['混沌工程(Chaos Monkey)', '故障注入', 'Jepsen测试', 'tc命令'], file: '25.html' },
        { num: '26', title: 'AI训练基础设施', topics: ['万卡集群架构', 'RDMA/RoCE', 'NCCL集合通信', '电力约束'], file: '26.html' },
        { num: '27', title: '边缘计算与IoT', topics: ['边缘-云协同', 'MQTT/CoAP', '联邦学习', '信息物理系统'], file: '27.html' },
        { num: '28', title: '综合实战项目', topics: ['实现Raft库', '构建分布式KV存储', '部署多节点集群', '性能分析与优化'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#e0f2fe; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
