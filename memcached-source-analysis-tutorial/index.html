<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Memcached 源码分析 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "⚙️";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>Memcached 源码分析</h1>
        <div class="sub">⚙️ 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从main函数到Mini-Memcached · 源码级深度剖析 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '为什么要读Memcached源码', topics: ['高性能缓存的意义', '源码阅读方法论', 'C项目代码审美'], file: '01.html' },
        { num: '02', title: '环境搭建与源码获取', topics: ['源码获取与编译', '调试环境配置', '版本选择与依赖'], file: '02.html' },
        { num: '03', title: '源码全景：目录结构与模块划分', topics: ['文件结构一览', '核心模块职责', '模块间调用关系'], file: '03.html' },
        { num: '04', title: '启动流程：main函数逐行解析', topics: ['settings初始化', '命令行解析', 'daemonize与信号'], file: '04.html' },
        { num: '05', title: '配置系统：settings与命令行', topics: ['settings结构体', 'growth_factor影响', '-o扩展选项'], file: '05.html' },
        { num: '06', title: '日志与统计系统', topics: ['logger环形缓冲', 'stats三大体系', '自定义stats指标'], file: '06.html' },
        { num: '07', title: '内存管理概览：slab allocator设计哲学', topics: ['malloc碎片问题', 'slab三层模型', 'slabclass_t结构体'], file: '07.html' },
        { num: '08', title: 'Slab Allocator初始化与分配', topics: ['slabs_init逐行解析', 'chunk对齐算法', 'page分配与切割'], file: '08.html' },
        { num: '09', title: 'Slab Allocator回收与平衡', topics: ['slots空闲链表', 'slab_rebalancer', 'slab_automove策略'], file: '09.html' },
        { num: '10', title: 'Item：数据存储的基本单元', topics: ['item结构体解析', 'CAS版本号机制', 'item内存布局'], file: '10.html' },
        { num: '11', title: 'Item生命周期：分配、访问与删除', topics: ['do_item_alloc流程', 'refcount引用计数', 'lazy expiration'], file: '11.html' },
        { num: '12', title: 'LRU淘汰机制：三级队列', topics: ['HOT/WARM/COLD队列', 'lru_bump状态机', 'LRU crawler线程'], file: '12.html' },
        { num: '13', title: '哈希表：assoc模块详解', topics: ['链地址法实现', 'assoc_find解析', 'MurmurHash3'], file: '13.html' },
        { num: '14', title: '哈希表扩容：渐进式rehash', topics: ['扩容触发条件', 'maintenance线程', '双表查找逻辑'], file: '14.html' },
        { num: '15', title: '事件驱动：libevent集成', topics: ['event_base架构', 'event_handler回调', 'EV_PERSIST模式'], file: '15.html' },
        { num: '16', title: '连接状态机：drive_machine详解', topics: ['conn_states枚举', '状态转换路径', 'transmit/try_read'], file: '16.html' },
        { num: '17', title: '多线程模型：Master-Worker架构', topics: ['LIBEVENT_THREAD', '管道唤醒机制', 'Round-Robin分发'], file: '17.html' },
        { num: '18', title: '并发控制：锁策略与无锁设计', topics: ['item分段锁', 'cache_lock', '无锁路径分析'], file: '18.html' },
        { num: '19', title: 'ASCII协议：proto_text详解', topics: ['GET/SET/DELETE命令', 'noreply优化', 'CAS协议实现'], file: '19.html' },
        { num: '20', title: '二进制协议：proto_bin详解', topics: ['24字节Header', 'opcode一览', 'SASL认证'], file: '20.html' },
        { num: '21', title: 'Meta Protocol：新一代协议', topics: ['模式标志(M)', 'stale-while-revalidate', '竞态条件防护'], file: '21.html' },
        { num: '22', title: 'External Storage：混合存储', topics: ['extstore架构', 'RAM+SSD分层', 'page管理与compaction'], file: '22.html' },
        { num: '23', title: 'Built-in Proxy：Lua路由', topics: ['Proxy嵌入架构', '路由策略实现', '故障转移逻辑'], file: '23.html' },
        { num: '24', title: '测试体系：t目录与测试框架', topics: ['prove+Test::More', '测试文件剖析', 'Valgrind集成'], file: '24.html' },
        { num: '25', title: '性能调优与生产踩坑', topics: ['参数调优实战', 'hot_key解决方案', 'NUMA与TIME_WAIT'], file: '25.html' },
        { num: '26', title: 'Memcached vs Redis/Valkey源码对比', topics: ['架构与内存模型对比', 'rehash与I/O差异', 'Valkey开源格局'], file: '26.html' },
        { num: '27', title: 'Memcached的未来与社区生态', topics: ['2025-2026路线图', '替代方案对比', '社区贡献指南'], file: '27.html' },
        { num: '28', title: '综合项目：手写Mini-Memcached', topics: ['Slab+Hash+LRU实现', 'libevent网络层', '压测与代码Review'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
