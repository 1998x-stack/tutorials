<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>以太网通信 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🌐";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>以太网通信</h1>
        <div class="sub">🌐 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '以太网的起源与精神', topics: ['Bob Metcalfe', 'ALOHA网络', '以太网命名'], file: '01.html' },
        { num: '02', title: '以太网的演化史', topics: ['10BASE5→10BASE-T', '交换式以太网', '速率跃迁'], file: '02.html' },
        { num: '03', title: 'OSI模型与以太网的位置', topics: ['物理层·数据链路层', 'LLC·MAC子层', '封装过程'], file: '03.html' },
        { num: '04', title: '以太网帧格式深度解析', topics: ['DIX帧', 'IEEE 802.3帧', 'VLAN标签帧'], file: '04.html' },
        { num: '05', title: 'MAC地址与寻址机制', topics: ['OUI', '单播·组播·广播', 'MAC表'], file: '05.html' },
        { num: '06', title: 'CSMA/CD与半双工时代', topics: ['冲突域', '截断二进制指数退避', '最小时隙'], file: '06.html' },
        { num: '07', title: '从共享介质到全双工交换', topics: ['全双工·微秒级转发', '冲突域消失', '背板带宽'], file: '07.html' },
        { num: '08', title: '透明桥接与生成树协议', topics: ['洪泛与学习', 'STP·RSTP', 'BPDU'], file: '08.html' },
        { num: '09', title: 'VLAN与802.1Q', topics: ['广播域隔离', 'Trunk·Access', 'QinQ'], file: '09.html' },
        { num: '10', title: '链路聚合与LACP', topics: ['LAG', '负载分担', '跨设备聚合'], file: '10.html' },
        { num: '11', title: '以太网流控与QoS', topics: ['PFC', 'ECN', '优先级队列'], file: '11.html' },
        { num: '12', title: '组播与IGMP Snooping', topics: ['IP组播→MAC组播映射', 'IGMP·MLD', '23位陷阱'], file: '12.html' },
        { num: '13', title: '以太网OAM与链路监控', topics: ['CFM·Y.1731', '丢包·时延测量', 'Dying Gasp'], file: '13.html' },
        { num: '14', title: 'MACsec与链路层安全', topics: ['802.1AE', 'GCM-AES', '密钥协商'], file: '14.html' },
        { num: '15', title: '园区网络设计实战', topics: ['三层架构', '堆叠·虚拟化', '高可用'], file: '15.html' },
        { num: '16', title: '数据中心以太网架构', topics: ['Clos网络', 'Spine-Leaf', 'ECMP'], file: '16.html' },
        { num: '17', title: '以太网供电(PoE)', topics: ['802.3af·at·bt', 'PSE·PD', '供电协商'], file: '17.html' },
        { num: '18', title: '以太网故障排查方法论', topics: ['分层排查', '流量分析', '常见故障模式'], file: '18.html' },
        { num: '19', title: '时间敏感网络(TSN)', topics: ['802.1Qbv', '802.1AS', '确定性延迟'], file: '19.html' },
        { num: '20', title: '汽车以太网', topics: ['100BASE-T1', '1000BASE-T1', 'DoIP'], file: '20.html' },
        { num: '21', title: '单对以太网(SPE)', topics: ['10BASE-T1L', 'PoDL', '工业物联网'], file: '21.html' },
        { num: '22', title: '虚拟化与Overlay网络', topics: ['VXLAN', 'NVGRE', 'EVPN'], file: '22.html' },
        { num: '23', title: 'Wireshark抓包分析实战', topics: ['捕获过滤器·显示过滤器', 'TCP流追踪', '协议解析'], file: '23.html' },
        { num: '24', title: '网络性能测试与基准', topics: ['iperf3', 'RFC 2544', '吞吐量·时延·抖动'], file: '24.html' },
        { num: '25', title: '软件定义网络与以太网', topics: ['OpenFlow', 'SDN控制器', 'P4可编程交换'], file: '25.html' },
        { num: '26', title: '超以太网：UEC与AI网络', topics: ['UEC 1.0', '报文喷洒', 'LLR链路重传'], file: '26.html' },
        { num: '27', title: '800G/1.6T与400G/通道技术', topics: ['PAM4·PAM6', '112G·224G SerDes', 'LPO·CPO'], file: '27.html' },
        { num: '28', title: '综合项目：企业网络设计', topics: ['需求分析·拓扑设计', 'VLAN规划·安全策略', '文档交付'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
