<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>操作系统 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🖥️";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>操作系统</h1>
        <div class="sub">🖥️ 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '什么是操作系统', topics: ['操作系统定义', '发展历史', 'OS分类与设计哲学'], file: '01.html' },
        { num: '02', title: '硬件架构基础', topics: ['冯·诺依曼架构', 'x86/ARM/RISC-V', '存储金字塔', '中断与异常'], file: '02.html' },
        { num: '03', title: 'OS内核架构', topics: ['宏内核', '微内核', '混合内核', 'Unikernel'], file: '03.html' },
        { num: '04', title: '用户态与内核态', topics: ['特权级别', '系统调用全流程', 'strace实战', '上下文切换成本'], file: '04.html' },
        { num: '05', title: '引导与初始化', topics: ['BIOS/UEFI', 'GRUB/systemd-boot', 'initramfs', 'systemd启动编排'], file: '05.html' },
        { num: '06', title: 'OS内核源码初探', topics: ['Linux内核源码目录树', '编码风格', '内核模块', 'Kconfig/Kbuild'], file: '06.html' },
        { num: '07', title: 'OS实验环境搭建', topics: ['QEMU虚拟平台', 'GDB远程调试', 'xv6教学内核', 'perf/bpftrace/ftrace'], file: '07.html' },
        { num: '08', title: '进程管理', topics: ['task_struct', '进程五状态模型', 'fork写时拷贝', 'execve加载程序'], file: '08.html' },
        { num: '09', title: '线程与协程', topics: ['内核线程', '1:1 vs M:N模型', 'clone系统调用', '协程与async/await'], file: '09.html' },
        { num: '10', title: 'CPU调度', topics: ['O(n)→CFS→EEVDF', 'vruntime红黑树', 'sched_ext用户态调度', 'PREEMPT_RT实时'], file: '10.html' },
        { num: '11', title: '同步与互斥', topics: ['自旋锁vs互斥锁', '信号量PV操作', 'RCU读多写少', '死锁与lockdep'], file: '11.html' },
        { num: '12', title: '虚拟内存', topics: ['四级页表遍历', 'TLB加速器', '缺页中断全流程', '大页与mTHP'], file: '12.html' },
        { num: '13', title: '物理内存管理', topics: ['Buddy System', 'Slab/Slub分配器', '页面回收与swap', 'MGLRU多代LRU'], file: '13.html' },
        { num: '14', title: '文件系统', topics: ['VFS统一接口', 'inode与dentry', 'ext4区段树', 'Btrfs写时复制'], file: '14.html' },
        { num: '15', title: 'I/O模型与io_uring', topics: ['五种I/O模型', 'epoll事件驱动', 'io_uring环形队列', '零拷贝技术矩阵'], file: '15.html' },
        { num: '16', title: '设备驱动', topics: ['Linux设备模型', '字符设备驱动', '设备树Device Tree', 'Rust驱动开发'], file: '16.html' },
        { num: '17', title: '中断与异常处理', topics: ['上半部/下半部', '软中断→tasklet→workqueue', '中断亲和性', 'PREEMPT_RT中断线程化'], file: '17.html' },
        { num: '18', title: '时间管理', topics: ['jiffies与HZ', 'hrtimer高精度定时器', 'TSC/HPET/PIT时钟源', '时钟漂移与闰秒'], file: '18.html' },
        { num: '19', title: '网络协议栈', topics: ['数据包内核路径', '三次握手实现', 'Netfilter五链四表', 'XDP可编程数据路径'], file: '19.html' },
        { num: '20', title: 'eBPF可观测性', topics: ['eBPF架构全景', 'bpftrace单行追踪', 'kprobe vs tracepoint', 'BPF Map类型'], file: '20.html' },
        { num: '21', title: '虚拟化技术', topics: ['KVM Hypervisor', 'vCPU调度', 'virtio半虚拟化', 'Popek-Goldberg定理'], file: '21.html' },
        { num: '22', title: '容器与命名空间', topics: ['六种Namespace', 'cgroup v2层级', 'OverlayFS分层', '从chroot到Docker'], file: '22.html' },
        { num: '23', title: '内核调试技术', topics: ['printk动态调试', 'kdump+crash分析', 'KASAN/UBSAN检测', 'kgdb源码级调试'], file: '23.html' },
        { num: '24', title: '性能分析与调优', topics: ['perf全景', '火焰图生成', '内存泄漏排查', 'I/O延迟分析'], file: '24.html' },
        { num: '25', title: '动手写一个小OS', topics: ['实模式Bootloader', 'GDT/IDT设置', '物理页分配器', 'Ring 0→Ring 3切换'], file: '25.html' },
        { num: '26', title: '现代OS前沿趋势', topics: ['Rust for Linux', 'LDOS AI驱动OS', 'seL4微内核复兴', 'RISC-V+Rust生态'], file: '26.html' },
        { num: '27', title: 'OS内核设计决策', topics: ['宏内核vs微内核之争', '不破坏用户空间铁律', 'ABI稳定性权衡', '关键设计取舍'], file: '27.html' },
        { num: '28', title: '综合项目', topics: ['eBPF分析调度延迟', '字符设备驱动', 'xv6添加COW fork', '内核火焰图'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
