<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9fcf5 0%, #e8f3e8 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 140, 100, 0.15), 0 8px 20px rgba(0, 30, 20, 0.08);
            border: 1px solid rgba(255, 245, 200, 0.5);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #f7d44a;
            padding-bottom: 0.75rem;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #2b7a4b, #3f9e6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(60, 140, 80, 0.12);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1 .emoji {
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(255, 200, 50, 0.3));
        }

        .header .sub {
            font-size: 1rem;
            background: #fef7e0;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #3f6b4a;
            font-weight: 600;
            border: 1px solid #f3d98a;
            box-shadow: 0 2px 6px rgba(200, 160, 50, 0.1);
            white-space: nowrap;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 120, 80, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(210, 230, 200, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(2px);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 140, 90, 0.15), 0 4px 12px rgba(40, 100, 60, 0.05);
            border-color: #b8d9b0;
            background: #fefefc;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }

        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #f5d142;
            color: #2a5a3a;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            box-shadow: inset 0 -2px 0 #dbb42c;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #1f4d33;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }

        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }

        .topic-list li {
            font-size: 0.8rem;
            color: #2d543a;
            background: #f1f9ee;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #dcebd4;
            box-shadow: inset 0 1px 2px white;
        }

        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #e5b13b;
        }

        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #d4e8d0;
            padding-top: 0.5rem;
        }

        .card-footer a {
            background: #b7d8b0;
            color: #1f452b;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #8fb88a;
            box-shadow: 0 2px 4px rgba(60, 120, 60, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .card-footer a::after {
            content: "→";
            font-size: 1rem;
            transition: transform 0.1s;
        }

        .card-footer a:hover {
            background: #f7d44a;
            border-color: #dbb42c;
            color: #1f3d28;
            box-shadow: 0 4px 8px rgba(200, 160, 40, 0.2);
            transform: scale(1.02);
        }

        .card-footer a:active {
            transform: scale(0.96);
        }

        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #3b6b47;
            background: #f2fcee;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c6dfbe;
            box-shadow: 0 2px 8px rgba(80, 130, 70, 0.08);
            font-weight: 500;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
        }

        .footer span {
            background: #f9eec1;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            margin: 0 4px;
        }

        .footer .wechat {
            font-weight: 700;
            color: #1f5a33;
        }

        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .header .sub { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
            .topic-list li { font-size: 0.7rem; }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #f7d44a, #7fc47c, #4aa0b0, #f7b07a);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }

        /* Alternate chapter badge colors */
        .card:nth-child(6n+1) .chapter-num { background: #f7b07a; color: #3d2e1a; }
        .card:nth-child(6n+2) .chapter-num { background: #a7d4a0; color: #1f452b; }
        .card:nth-child(6n+3) .chapter-num { background: #f5d44a; color: #2f4d2a; }
        .card:nth-child(6n+4) .chapter-num { background: #b3d9e8; color: #1a3f4a; }
        .card:nth-child(6n+5) .chapter-num { background: #f7c6c6; color: #5a2e2e; }
        .card:nth-child(6n) .chapter-num { background: #c4b3e0; color: #2f2a4a; }

        .state-msg {
            text-align: center;
            padding: 3rem;
            color: #5f7f66;
            font-size: 1.1rem;
        }
        .state-msg.error {
            color: #b91c1c;
            background: #fef2f2;
            border-radius: 20px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><span class="emoji"></span><span class="title-text"></span></h1>
        <div class="sub"></div>
    </div>

    <div id="cardContainer" class="course-grid"></div>

    <div style="text-align:center;">
        <div class="footer"></div>
    </div>
</div>

<script>
    (function() {
        var container = document.getElementById('cardContainer');
        var emojiEl = document.querySelector('.header .emoji');
        var titleEl = document.querySelector('.header .title-text');
        var subEl = document.querySelector('.header .sub');
        var footerEl = document.querySelector('.footer');

        function showError(msg) {
            container.innerHTML = '<div class="state-msg error">' + msg + '</div>';
        }

        fetch('courses.json')
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                document.title = data.title + ' · 课程目录';
                emojiEl.textContent = data.emoji;
                titleEl.textContent = data.title;
                subEl.textContent = data.subtitle;
                footerEl.innerHTML = '<span>' + data.chapterCount + '章</span> 实战体系 · 从入门到精通';

                if (!data.chapters || data.chapters.length === 0) {
                    showError('暂无课程数据');
                    return;
                }

                container.innerHTML = '';
                data.chapters.forEach(function(course) {
                    var card = document.createElement('div');
                    card.className = 'card';

                    var headerDiv = document.createElement('div');
                    headerDiv.className = 'card-header';

                    var numSpan = document.createElement('span');
                    numSpan.className = 'chapter-num';
                    numSpan.textContent = course.num;

                    var titleSpan = document.createElement('span');
                    titleSpan.className = 'card-title';
                    titleSpan.textContent = course.title;

                    headerDiv.appendChild(numSpan);
                    headerDiv.appendChild(titleSpan);
                    card.appendChild(headerDiv);

                    if (course.topics && course.topics.length > 0) {
                        var topicUl = document.createElement('ul');
                        topicUl.className = 'topic-list';
                        course.topics.forEach(function(topic) {
                            var li = document.createElement('li');
                            li.textContent = topic;
                            topicUl.appendChild(li);
                        });
                        card.appendChild(topicUl);
                    }

                    var footerDiv = document.createElement('div');
                    footerDiv.className = 'card-footer';
                    var link = document.createElement('a');
                    link.href = course.file;
                    link.textContent = '开始学习 ';
                    footerDiv.appendChild(link);
                    card.appendChild(footerDiv);

                    container.appendChild(card);
                });
            })
            .catch(function(err) {
                showError('课程数据加载失败: ' + err.message + '。请刷新页面重试。');
            });
    })();
</script>

<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center; color:#92400e;">
        请启用 JavaScript 以浏览课程目录。
    </div>
</noscript>
</body>
</html>
