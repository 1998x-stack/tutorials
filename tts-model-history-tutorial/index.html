<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>TTS模型发展史 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🎙️";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>TTS模型发展史</h1>
        <div class="sub">🎙️ 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从机械合成到零样本克隆 · 五大代际 · 实战驱动</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '课程导览：从机械到智能', topics: ['TTS定义', '应用场景', '课程全景图'], file: '01.html' },
        { num: '02', title: '语音的数字表示', topics: ['采样率', '频谱图', 'Mel尺度', '基频F0'], file: '02.html' },
        { num: '03', title: '早期TTS：共振峰合成', topics: ['源-滤波器模型', 'DECtalk', 'KlattTalk'], file: '03.html' },
        { num: '04', title: '拼接合成时代', topics: ['Unit Selection', 'PSOLA', '语料库设计'], file: '04.html' },
        { num: '05', title: 'HMM统计参数合成', topics: ['HTS工具包', 'SPSS', '隐马尔可夫模型'], file: '05.html' },
        { num: '06', title: 'DNN参数合成', topics: ['DNN替代HMM', '时长/声学模型分离'], file: '06.html' },
        { num: '07', title: '前深度学习时代总结', topics: ['各代技术对比', 'MOS评测体系', '遗留问题'], file: '07.html' },
        { num: '08', title: 'WaveNet：深度学习破晓', topics: ['扩张因果卷积', '自回归波形生成', 'PixelCNN'], file: '08.html' },
        { num: '09', title: 'Tacotron系列', topics: ['Seq2Seq+Attention', 'Tacotron 2', '停止符预测'], file: '09.html' },
        { num: '10', title: '神经声码器大爆发', topics: ['WaveRNN', 'MelGAN', 'Parallel WaveGAN', 'HiFi-GAN'], file: '10.html' },
        { num: '11', title: 'FastSpeech并行合成', topics: ['非自回归', '时长预测器', '长度调节器'], file: '11.html' },
        { num: '12', title: 'VITS：端到端一体化', topics: ['VAE+GAN+Flow', '随机时长预测', '单调对齐搜索'], file: '12.html' },
        { num: '13', title: 'Glow-TTS与归一化流', topics: ['可逆变换', '单调对齐', '并行采样'], file: '13.html' },
        { num: '14', title: '扩散模型崛起', topics: ['Grad-TTS', 'DDPM', '分数匹配', 'NaturalSpeech'], file: '14.html' },
        { num: '15', title: 'TTS评测体系', topics: ['MOS', 'MCD', 'WER', '说话人相似度', 'AB测试'], file: '15.html' },
        { num: '16', title: '模型部署与推理加速', topics: ['ONNX', 'TensorRT', '量化', '知识蒸馏', '流式推理'], file: '16.html' },
        { num: '17', title: '多说话人建模', topics: ['d-vector/x-vector', 'GST风格标记', '少样本自适应'], file: '17.html' },
        { num: '18', title: '前端文本处理', topics: ['文本正则化', '分词', 'G2P', '多音字消歧'], file: '18.html' },
        { num: '19', title: '零样本语音克隆', topics: ['VALL-E', '神经编解码LM', '3秒克隆', '伦理边界'], file: '19.html' },
        { num: '20', title: '流匹配与快速采样', topics: ['Flow Matching', 'Voicebox', 'F5-TTS', 'DiT'], file: '20.html' },
        { num: '21', title: '情感与韵律控制', topics: ['情感嵌入', '韵律迁移', '自然语言指令可控'], file: '21.html' },
        { num: '22', title: '多语言与跨语言TTS', topics: ['XTTS', 'YourTTS', 'IPA统一表示', '低资源语言'], file: '22.html' },
        { num: '23', title: '开源TTS生态巡礼', topics: ['Coqui TTS', 'ESPnet-TTS', 'GPT-SoVITS', 'Bert-VITS2'], file: '23.html' },
        { num: '24', title: '训练自己的TTS模型', topics: ['数据准备', '配置解析', '训练监控', '常见踩坑'], file: '24.html' },
        { num: '25', title: '评估与A/B测试实践', topics: ['主观评测设计', '自动化MOS', '说话人相似度脚本'], file: '25.html' },
        { num: '26', title: '多模态全双工系统', topics: ['Moshi', 'GPT-4o', 'Qwen2.5-Omni', 'Thinker-Talker'], file: '26.html' },
        { num: '27', title: '2025-2026最新前沿', topics: ['LongCat-AudioDiT', 'VoxCPM2', 'SSM流式合成'], file: '27.html' },
        { num: '28', title: '实战项目：个性化语音助手', topics: ['需求分析', '模型选型', '部署上线', '效果评估'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
