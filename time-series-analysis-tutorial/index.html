<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>时间序列分析完全指南 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "📈";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>时间序列分析完全指南</h1>
        <div class="sub">📈 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '认识时间序列', topics: ['时序数据定义', '时间序列vs截面数据', '历史发展(1920sYule→1970sBox-Jenkins→2020s深度学习)', '应用场景总览'], file: '01.html' },
{ num: '02', title: '时序的组成与分解', topics: ['趋势/季节性/循环/残差', '加法模型vs乘法模型', 'STL分解', 'X11/SEATS季节调整'], file: '02.html' },
{ num: '03', title: '平稳性', topics: ['严平稳vs弱平稳', 'ADF检验', 'KPSS检验', '差分与Box-Cox变换'], file: '03.html' },
{ num: '04', title: '自相关分析', topics: ['ACF自相关函数', 'PACF偏自相关', '白噪声与Ljung-Box检验', 'AIC/BIC信息准则'], file: '04.html' },
{ num: '05', title: '指数平滑', topics: ['简单指数平滑', 'Holt线性方法', 'Holt-Winters季节性', 'ETS框架'], file: '05.html' },
{ num: '06', title: '时间序列回归', topics: ['时序上的OLS', '虚假回归问题', 'Durbin-Watson检验', 'Cochrane-Orcutt修正'], file: '06.html' },
{ num: '07', title: '频谱分析入门', topics: ['时域vs频域', '傅里叶级数', '周期图构建与解读', '谱泄漏与窗函数'], file: '07.html' },
{ num: '08', title: '自回归模型(AR)', topics: ['AR(p)模型', 'Yule-Walker方程', '特征根与平稳性条件', 'PACF定阶'], file: '08.html' },
{ num: '09', title: '移动平均模型(MA)', topics: ['MA(q)模型', '可逆性条件', 'MA与AR的对偶关系', 'ACF定阶'], file: '09.html' },
{ num: '10', title: 'ARMA模型', topics: ['ARMA(p,q)', 'ACF/PACF截断与拖尾', 'Box-Jenkins方法论', '模型简约性原则'], file: '10.html' },
{ num: '11', title: '差分与ARIMA', topics: ['差分阶数d', 'ARIMA(p,d,q)', '单位根', 'auto.arima算法思想'], file: '11.html' },
{ num: '12', title: '季节性ARIMA', topics: ['SARIMA(p,d,q)(P,D,Q)s', '季节性差分', '季节性ACF/PACF', '季节与非季节耦合'], file: '12.html' },
{ num: '13', title: '建模实践与诊断', topics: ['Box-Jenkins完整流程', '残差诊断', '参数显著性检验', '模型简化策略'], file: '13.html' },
{ num: '14', title: '预测与评估', topics: ['点预测与区间预测', 'MAE/RMSE/MAPE/MASE', '预测包络', '回测与前向验证'], file: '14.html' },
{ num: '15', title: '波动率建模(GARCH)', topics: ['ARCH模型', 'GARCH(1,1)', 'EGARCH/TGARCH', 'VaR风险价值'], file: '15.html' },
{ num: '16', title: '多元时间序列(VAR)', topics: ['VAR模型', 'Granger因果检验', '脉冲响应函数', '方差分解'], file: '16.html' },
{ num: '17', title: '协整与误差修正', topics: ['协整概念', 'Engle-Granger两步法', 'Johansen检验', 'VECM模型'], file: '17.html' },
{ num: '18', title: '状态空间与卡尔曼滤波', topics: ['状态空间表示', '卡尔曼滤波递推', '卡尔曼增益', '动态线性模型'], file: '18.html' },
{ num: '19', title: '时序特征工程', topics: ['滞后特征', '滚动窗口统计', '日历特征与傅里叶项', '缺失值与异常检测'], file: '19.html' },
{ num: '20', title: '树模型与时序预测', topics: ['XGBoost/LightGBM/CatBoost', '特征重要性', '超参数调优', '数据泄漏陷阱'], file: '20.html' },
{ num: '21', title: 'Prophet与自动预测', topics: ['Prophet加法模型', '变点检测', 'Nixtla生态', 'statsforecast/mlforecast'], file: '21.html' },
{ num: '22', title: '时序交叉验证', topics: ['扩展窗口vs滑动窗口', '前向验证', '清除与禁运', '模型集成'], file: '22.html' },
{ num: '23', title: '循环神经网络', topics: ['RNN/LSTM/GRU', 'Seq2Seq架构', '梯度消失与裁剪', 'Teacher Forcing'], file: '23.html' },
{ num: '24', title: '卷积与时序', topics: ['1D CNN', 'TCN膨胀卷积', 'WaveNet', 'CNN-LSTM混合架构'], file: '24.html' },
{ num: '25', title: 'Transformer与时序', topics: ['自注意力机制', 'Informer/Autoformer', 'PatchTST', 'TFT可解释注意力'], file: '25.html' },
{ num: '26', title: '基础模型与扩散模型', topics: ['TimesFM/Chronos/TimeGPT', '零样本预测', 'CSDI/TS-DiT扩散模型', 'tokenization策略'], file: '26.html' },
{ num: '27', title: '生产部署与MLOps', topics: ['FastAPI/Docker', 'MLflow模型管理', '漂移检测', 'InfluxDB/TimescaleDB'], file: '27.html' },
{ num: '28', title: '综合实战项目', topics: ['端到端电商预测', '基线→统计→ML→DL→集成', '全模型对比', 'Top 10常见错误回顾'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
