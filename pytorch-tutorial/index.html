<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>PyTorch 深度学习实战教程 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🔥";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>PyTorch 深度学习实战教程</h1>
        <div class="sub">🔥 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '初识PyTorch', topics: ['深度学习框架简史', 'PyTorch vs TensorFlow/JAX', '安装与环境配置', '第一个PyTorch程序'], file: '01.html' },
        { num: '02', title: '张量操作基础', topics: ['Tensor创建方式', '数据类型(dtype)', '设备(device)', '索引与切片'], file: '02.html' },
        { num: '03', title: '张量运算与广播', topics: ['数学运算', '矩阵乘法', '广播机制', '内存布局'], file: '03.html' },
        { num: '04', title: '自动求导机制', topics: ['计算图原理', 'autograd机制', 'backward()详解', '梯度累积'], file: '04.html' },
        { num: '05', title: '构建第一个神经网络', topics: ['nn.Module基础', 'nn.Linear', '激活函数', '前向传播'], file: '05.html' },
        { num: '06', title: '损失函数与优化器', topics: ['常用损失函数', '梯度下降原理', 'SGD/Adam', '参数更新循环'], file: '06.html' },
        { num: '07', title: '完整训练流程', topics: ['训练/验证/测试划分', '训练循环模板', '过拟合初体验', '学习率调度器'], file: '07.html' },
        { num: '08', title: '数据加载与预处理', topics: ['Dataset/DataLoader', '自定义数据集', '数据增强', 'num_workers'], file: '08.html' },
        { num: '09', title: '卷积神经网络', topics: ['Conv2d原理', '池化层', 'BatchNorm', 'CNN架构设计'], file: '09.html' },
        { num: '10', title: '循环神经网络与注意力', topics: ['RNN/LSTM/GRU', '序列数据处理', '自注意力机制', 'Transformer编码器'], file: '10.html' },
        { num: '11', title: '模型保存与加载', topics: ['state_dict', '检查点设计', '断点续训', '跨设备加载'], file: '11.html' },
        { num: '12', title: '训练技巧与调参', topics: ['学习率调优', '早停策略', '权重初始化', '梯度裁剪'], file: '12.html' },
        { num: '13', title: '模型评估与可视化', topics: ['准确率/召回率', '混淆矩阵', 'TensorBoard', '训练曲线分析'], file: '13.html' },
        { num: '14', title: '迁移学习', topics: ['预训练模型', '特征提取vs微调', 'torchvision.models', '冻结层策略'], file: '14.html' },
        { num: '15', title: '混合精度训练', topics: ['FP16/BF16原理', 'torch.amp.autocast', 'GradientScaler', '性能对比'], file: '15.html' },
        { num: '16', title: '训练陷阱与调试', topics: ['五大常见错误', 'NaN/Inf排查', '梯度检查', '过拟合单batch测试'], file: '16.html' },
        { num: '17', title: '性能优化基础', topics: ['torch.compile入门', 'cudnn.benchmark', '内存管理', 'profile工具'], file: '17.html' },
        { num: '18', title: '可复现性与实验管理', topics: ['随机种子设置', '确定性算法', '实验配置记录', '模型版本管理'], file: '18.html' },
        { num: '19', title: 'torch.compile深度解析', topics: ['TorchDynamo图捕获', 'FX Graph', 'TorchInductor后端', 'graph break排查'], file: '19.html' },
        { num: '20', title: '自定义层与算子', topics: ['自定义nn.Module', 'autograd Function', 'CUDA扩展入门', 'torch.compile兼容'], file: '20.html' },
        { num: '21', title: '分布式训练入门', topics: ['DDP原理', '进程组初始化', '梯度同步', '多GPU训练实战'], file: '21.html' },
        { num: '22', title: 'FSDP与大模型训练', topics: ['fully_shard API', 'ZeRO策略对比', '混合精度策略', '检查点分片'], file: '22.html' },
        { num: '23', title: '模型部署与导出', topics: ['torch.export', 'ONNX导出', 'TorchServe', '推理优化'], file: '23.html' },
        { num: '24', title: 'Profiling与性能分析', topics: ['torch.profiler', 'Chrome Trace', '内存分析', '瓶颈定位'], file: '24.html' },
        { num: '25', title: 'PyTorch生态系统', topics: ['torchvision/audio/text', 'HuggingFace集成', 'PyTorch Lightning', 'Accelerate'], file: '25.html' },
        { num: '26', title: 'PyTorch前沿发展', topics: ['torch.accelerator API', 'FlashAttention-4', 'MX量化格式', 'CUDA 13新特性'], file: '26.html' },
        { num: '27', title: '实战项目：图像分类', topics: ['数据准备与预处理', '模型设计训练', '超参数调优', '部署导出'], file: '27.html' },
        { num: '28', title: '课程总结与学习路线', topics: ['知识图谱回顾', '进阶学习路线', '社区参与', '面试准备建议'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
