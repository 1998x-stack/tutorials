<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>RAG检索增强生成从入门到精通 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f5f3ff 0%, #e8f5f0 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 80, 180, 0.15), 0 8px 20px rgba(40, 20, 80, 0.08);
            border: 1px solid rgba(200, 180, 240, 0.5);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🤖";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(80, 60, 160, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 180, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(80, 60, 160, 0.15), 0 4px 12px rgba(60, 40, 120, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        .part-section {
            margin: 1.5rem 0 0.5rem;
            padding: 0.3rem 1rem;
            background: #ede9fe;
            border-radius: 20px;
            display: inline-block;
            font-weight: 650;
            color: #5b21b6;
            font-size: 0.95rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>RAG检索增强生成 · 从入门到精通</h1>
        <div class="sub">📘 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: 'RAG概述与演进', topics: ['大模型三大痛点', 'RAG发展三阶段', '四阶段架构总览', 'RAG vs 微调'], file: '01.html' },
        { num: '02', title: '大语言模型基础', topics: ['Transformer架构', 'LLM知识边界', '幻觉根因分析', 'Token与上下文窗口'], file: '02.html' },
        { num: '03', title: 'RAG核心架构', topics: ['四阶段数据流', '离线索引vs在线推理', '系统拓扑结构', '首个RAG Demo'], file: '03.html' },
        { num: '04', title: '知识库与文档解析', topics: ['多源数据加载', 'PDF解析实战', '表格与图片提取', '元数据管理'], file: '04.html' },
        { num: '05', title: '文本分块策略', topics: ['固定大小与语义分块', '层级与命题分块', 'Agentic Chunking', 'SCAR自适应检索'], file: '05.html' },
        { num: '06', title: '向量嵌入技术', topics: ['Embedding数学直觉', '模型选型对比', '稀疏与稠密嵌入', '领域微调方法'], file: '06.html' },
        { num: '07', title: '向量数据库入门', topics: ['ANN搜索原理', 'HNSW与IVF索引', '主流向量库对比', '过滤搜索实战'], file: '07.html' },
        { num: '08', title: '稀疏检索与BM25', topics: ['倒排索引原理', 'BM25公式详解', 'SPLADE学习型检索', '中文分词优化'], file: '08.html' },
        { num: '09', title: '稠密检索与语义搜索', topics: ['DPR双编码器', '相似度度量方法', '语义漂移问题', 'BGE特殊用法'], file: '09.html' },
        { num: '10', title: '混合检索策略', topics: ['稀疏+稠密融合', 'RRF结果融合', '多路召回架构', '生产环境配置'], file: '10.html' },
        { num: '11', title: '重排序技术', topics: ['Cross-Encoder原理', '两阶段检索架构', '主流Reranker对比', '性能与精度权衡'], file: '11.html' },
        { num: '12', title: '查询优化与重写', topics: ['HyDE假设文档嵌入', 'Step-Back后退提示', '查询分解', '查询路由'], file: '12.html' },
        { num: '13', title: '上下文增强与提示工程', topics: ['上下文窗口管理', 'Lost-in-the-Middle', '提示模板设计', '上下文压缩'], file: '13.html' },
        { num: '14', title: '生成与引用溯源', topics: ['可控生成参数', '内联引用机制', '置信度标注', '生成失败模式'], file: '14.html' },
        { num: '15', title: '幻觉检测与事实核查', topics: ['五种幻觉类型', 'NLI事实验证', '声明级校验', 'DeepEval框架'], file: '15.html' },
        { num: '16', title: '内容安全护栏', topics: ['输入输出护栏', '越狱攻击防御', 'PII脱敏处理', 'EU AI Act合规'], file: '16.html' },
        { num: '17', title: '数据隐私与访问控制', topics: ['文档级权限模型', '多租户隔离', '动态检索过滤', '审计日志追溯'], file: '17.html' },
        { num: '18', title: 'RAG评估体系', topics: ['三维度评估', 'RAGAS框架详解', 'Golden Dataset构建', 'CI/CD评估流水线'], file: '18.html' },
        { num: '19', title: '多模态RAG', topics: ['图文跨模态检索', 'CLIP模型应用', '表格检索策略', 'VLM多模态生成'], file: '19.html' },
        { num: '20', title: 'GraphRAG与知识图谱', topics: ['向量检索盲区', '知识图谱构建', 'Microsoft GraphRAG', '多跳推理'], file: '20.html' },
        { num: '21', title: 'Agentic RAG', topics: ['LLM Agent编排', 'LangGraph工作流', 'ReAct模式', 'NVIDIA Blueprint'], file: '21.html' },
        { num: '22', title: '高级索引架构', topics: ['层级索引设计', '自修正索引', '增量实时更新', '多租户索引'], file: '22.html' },
        { num: '23', title: 'LangChain vs LlamaIndex', topics: ['框架设计哲学', '核心抽象对比', '数据摄入能力', '混用最佳实践'], file: '23.html' },
        { num: '24', title: '向量数据库选型与优化', topics: ['性能Benchmark', '索引参数调优', '存储成本分析', '分布式扩展'], file: '24.html' },
        { num: '25', title: 'RAG调试与可观测性', topics: ['OpenTelemetry追踪', '延迟分析定位', '检索质量诊断', '监控Dashboard'], file: '25.html' },
        { num: '26', title: '前沿RAG技术', topics: ['CRAG自适应纠正', 'Self-RAG反思', 'Speculative RAG', 'FLARE主动检索'], file: '26.html' },
        { num: '27', title: '生产级RAG部署', topics: ['Docker容器化', '水平扩展架构', '语义缓存', 'GPU资源规划'], file: '27.html' },
        { num: '28', title: '端到端RAG项目实战', topics: ['需求分析与架构', '数据管线搭建', '链路联调', '评估与持续优化'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
