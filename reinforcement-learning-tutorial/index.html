<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>强化学习从入门到精通实战 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f8f6ff 0%, #ede9fe 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(109, 40, 217, 0.12), 0 8px 20px rgba(80, 40, 180, 0.06);
            border: 1px solid rgba(180, 160, 240, 0.4);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #a78bfa;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #5b21b6, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(100, 50, 200, 0.12);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🤖";
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(120, 60, 220, 0.3));
        }
        .header .sub {
            font-size: 1rem;
            background: #f5f3ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            box-shadow: 0 2px 6px rgba(100, 40, 200, 0.08);
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(100, 50, 200, 0.06), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(180, 160, 230, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(100, 50, 200, 0.12), 0 4px 12px rgba(80, 40, 160, 0.05);
            border-color: #a78bfa;
            background: #fefcff;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #a78bfa;
            color: #f5f3ff;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            box-shadow: inset 0 -2px 0 #7c3aed;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #3b0764;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #4c1d95;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #ddd6fe;
            box-shadow: inset 0 1px 2px white;
        }
        .topic-list li::before {
            content: "🧠";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #ddd6fe;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #c4b5fd;
            color: #3b0764;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #a78bfa;
            box-shadow: 0 2px 4px rgba(100, 50, 200, 0.08);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; transition: transform 0.1s; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #6d28d9;
            color: #ffffff;
            box-shadow: 0 4px 8px rgba(100, 50, 200, 0.2);
            transform: scale(1.02);
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            box-shadow: 0 2px 8px rgba(100, 50, 200, 0.06);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #a78bfa, #06b6d4, #67e8f9);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        .card:nth-child(7n+1) .chapter-num { background: #7c3aed; color: #f5f3ff; }
        .card:nth-child(7n+2) .chapter-num { background: #8b5cf6; color: #faf5ff; }
        .card:nth-child(7n+3) .chapter-num { background: #a78bfa; color: #2e1065; }
        .card:nth-child(7n+4) .chapter-num { background: #06b6d4; color: #164e63; }
        .card:nth-child(7n+5) .chapter-num { background: #c4b5fd; color: #3b0764; }
        .card:nth-child(7n+6) .chapter-num { background: #22d3ee; color: #155e75; }
        .card:nth-child(7n) .chapter-num { background: #67e8f9; color: #164e63; }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .header .sub { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
            .topic-list li { font-size: 0.7rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>强化学习 · 从入门到精通</h1>
        <div class="sub">🧠 28章 系统体系</div>
    </div>

    <div id="cardContainer" class="course-grid"></div>

    <div class="footer">
        全面覆盖 MDP、DQN、策略梯度、PPO、SAC、多智能体 RL、RLHF 等核心主题
    </div>
</div>

<script>
    (function() {
        const courses = [
            { num: '01', title: '强化学习是什么', topics: ['RL核心概念', '学习范式对比', '发展里程碑', '应用场景'], file: '01.html' },
            { num: '02', title: '必备数学工具箱', topics: ['概率与期望', '线性代数', '梯度下降', '数学到RL的桥梁'], file: '02.html' },
            { num: '03', title: '马尔可夫决策过程', topics: ['MDP五元组', '马尔可夫性质', '转移与奖励', 'GridWorld建模'], file: '03.html' },
            { num: '04', title: '贝尔曼方程', topics: ['V(s)与Q(s,a)', '期望方程', '最优方程', '备份图'], file: '04.html' },
            { num: '05', title: '动态规划', topics: ['策略评估', '策略改进', '策略迭代', '价值迭代'], file: '05.html' },
            { num: '06', title: '蒙特卡洛方法', topics: ['MC预测', 'MC控制', 'ε-贪心', 'MC vs DP vs TD'], file: '06.html' },
            { num: '07', title: '时序差分学习', topics: ['TD(0)预测', 'SARSA', 'Q-Learning', 'TD(λ)资格迹'], file: '07.html' },
            { num: '08', title: '值函数逼近', topics: ['维度诅咒', '线性逼近', '非线性逼近', '半梯度方法'], file: '08.html' },
            { num: '09', title: '深度Q网络(DQN)', topics: ['经验回放', '目标网络', 'Atari突破', 'DQN算法流程'], file: '09.html' },
            { num: '10', title: 'DQN改进家族', topics: ['Double DQN', 'Dueling DQN', '优先经验回放', 'Rainbow'], file: '10.html' },
            { num: '11', title: '策略梯度方法', topics: ['策略参数化', '梯度定理', 'REINFORCE', '基线技巧'], file: '11.html' },
            { num: '12', title: 'Actor-Critic方法', topics: ['AC架构', '优势函数', 'A2C/A3C', 'GAE'], file: '12.html' },
            { num: '13', title: 'PPO与TRPO', topics: ['信任域', 'TRPO约束', 'PPO-Clip', 'PPO实现细节'], file: '13.html' },
            { num: '14', title: '连续动作空间算法', topics: ['DDPG', 'TD3', 'SAC', '最大熵框架'], file: '14.html' },
            { num: '15', title: '探索与利用策略', topics: ['ε-贪心变体', 'UCB', '汤普森采样', '深度RL探索'], file: '15.html' },
            { num: '16', title: '奖励设计与塑形', topics: ['奖励函数设计', '稀疏奖励', '奖励塑形', '课程学习'], file: '16.html' },
            { num: '17', title: '训练稳定性与调参', topics: ['Deadly Triad', '稳定性技巧', '调参方法论', '网络初始化'], file: '17.html' },
            { num: '18', title: '安全强化学习', topics: ['约束MDP', '安全层', '安全探索', '工业部署'], file: '18.html' },
            { num: '19', title: '基于模型的强化学习', topics: ['Dyna-Q', '世界模型', 'MBPO', 'Dreamer'], file: '19.html' },
            { num: '20', title: '离线强化学习', topics: ['分布偏移', 'CQL', 'IQL', 'Decision Transformer'], file: '20.html' },
            { num: '21', title: '多智能体强化学习', topics: ['CTDE', 'MADDPG', 'QMIX', '自博弈'], file: '21.html' },
            { num: '22', title: '逆强化学习与模仿学习', topics: ['行为克隆', 'MaxEnt IRL', '学徒学习', 'GAIL'], file: '22.html' },
            { num: '23', title: 'Gymnasium环境实战', topics: ['Gymnasium API', '经典环境', '自定义环境', 'Wrapper'], file: '23.html' },
            { num: '24', title: 'Stable-Baselines3入门', topics: ['SB3架构', '训练脚本', '回调系统', '超参数调优'], file: '24.html' },
            { num: '25', title: '调试与可视化', topics: ['TensorBoard', 'WandB', '奖励曲线诊断', '常见Bug'], file: '25.html' },
            { num: '26', title: '强化学习前沿方向', topics: ['LLM+RL', 'RLHF', '元RL', 'Foundation Agent'], file: '26.html' },
            { num: '27', title: '从零实现DQN', topics: ['PyTorch实现', '经验回放', '训练循环', '评估与分析'], file: '27.html' },
            { num: '28', title: '综合实战：Atari智能体', topics: ['Atari环境', 'CNN架构', '完整Pipeline', '结果分析'], file: '28.html' }
        ];

        const container = document.getElementById('cardContainer');
        if (!container) return;
        container.innerHTML = '';

        courses.forEach(course => {
            const card = document.createElement('div');
            card.className = 'card';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'card-header';
            const numSpan = document.createElement('span');
            numSpan.className = 'chapter-num';
            numSpan.textContent = course.num;
            const titleSpan = document.createElement('span');
            titleSpan.className = 'card-title';
            titleSpan.textContent = course.title;
            headerDiv.appendChild(numSpan);
            headerDiv.appendChild(titleSpan);
            card.appendChild(headerDiv);

            const topicUl = document.createElement('ul');
            topicUl.className = 'topic-list';
            course.topics.forEach(topic => {
                const li = document.createElement('li');
                li.textContent = topic;
                topicUl.appendChild(li);
            });
            card.appendChild(topicUl);

            const footerDiv = document.createElement('div');
            footerDiv.className = 'card-footer';
            const link = document.createElement('a');
            link.href = course.file;
            link.textContent = '开始学习 ';
            footerDiv.appendChild(link);
            card.appendChild(footerDiv);

            container.appendChild(card);
        });
    })();
</script>

<noscript>
    <div style="background:#f5f3ff; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
