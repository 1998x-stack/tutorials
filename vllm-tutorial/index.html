<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>vLLM 大模型推理引擎从入门到精通实战 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f5f3ff 0%, #e8f5f0 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(180, 160, 220, 0.5);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #6d28d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(100, 80, 180, 0.12);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🧠";
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(124, 58, 237, 0.3));
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            box-shadow: 0 2px 6px rgba(120, 80, 200, 0.1);
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(180, 160, 220, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>vLLM 大模型推理引擎 · 从入门到精通</h1>
        <div class="sub">🧠 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: 'LLM推理基础', topics: ['自回归生成', 'Prefill vs Decode', 'KV Cache原理', '显存估算'], file: '01.html' },
        { num: '02', title: 'vLLM概述', topics: ['发展历程', '核心创新', '竞品对比', '适用场景'], file: '02.html' },
        { num: '03', title: 'PagedAttention上篇', topics: ['虚拟内存类比', 'Block Table', '按需分配', 'Free Block Pool'], file: '03.html' },
        { num: '04', title: 'PagedAttention下篇', topics: ['Slot Mapping', 'Copy-on-Write', 'Block Size权衡', 'Flash Attn配合'], file: '04.html' },
        { num: '05', title: 'Continuous Batching', topics: ['静态vs动态批处理', 'Chunked Prefill', '调度粒度', '性能对比'], file: '05.html' },
        { num: '06', title: '快速上手', topics: ['安装环境', '离线推理', '在线API服务', 'Docker部署'], file: '06.html' },
        { num: '07', title: '模型加载与配置', topics: ['模型来源', '量化加载', '显存参数', '常见踩坑'], file: '07.html' },
        { num: '08', title: 'KV Cache管理', topics: ['显存精确估算', 'Free Block Pool', 'FP8量化', '分层存储'], file: '08.html' },
        { num: '09', title: 'Prefix Caching', topics: ['零开销实现', '命中率分析', 'RAG场景收益', '前缀感知路由'], file: '09.html' },
        { num: '10', title: '调度器详解', topics: ['FCFS策略', 'Priority优先级', 'Preemption抢占', '统一调度器'], file: '10.html' },
        { num: '11', title: 'Chunked Prefill', topics: ['长Prompt处理', '吞吐延迟平衡', 'Chunk Size选择', '与Prefix Cache配合'], file: '11.html' },
        { num: '12', title: 'V1架构上篇', topics: ['1+N多进程', 'EngineCore', 'ZeroMQ总线', '故障隔离'], file: '12.html' },
        { num: '13', title: 'V1架构下篇', topics: ['V0 vs V1性能', '兼容性变化', '特性成熟度', '迁移指南'], file: '13.html' },
        { num: '14', title: 'Sampling与生成控制', topics: ['采样参数全解', 'Temperature', '结构化输出', 'Logprobs'], file: '14.html' },
        { num: '15', title: '生产级部署', topics: ['Docker部署', '显存规划', '反向代理', '高可用架构'], file: '15.html' },
        { num: '16', title: 'Kubernetes部署', topics: ['Production Stack', 'Helm Chart', '前缀感知路由', 'GPU资源管理'], file: '16.html' },
        { num: '17', title: '可观测性', topics: ['三层监控体系', 'Prometheus指标', 'Grafana告警', '链路追踪'], file: '17.html' },
        { num: '18', title: '安全与访问控制', topics: ['API鉴权', 'Rate Limiting', 'Prompt Injection', '网络安全'], file: '18.html' },
        { num: '19', title: '张量并行', topics: ['Megatron-LM算法', 'NCCL通信', 'NVLINK vs PCIe', '性能分析'], file: '19.html' },
        { num: '20', title: '流水线与数据并行', topics: ['按层切分', '跨节点PP', 'DP吞吐优化', 'MoE并行'], file: '20.html' },
        { num: '21', title: '推测解码', topics: ['n-gram方法', 'EAGLE', 'Medusa', 'P-EAGLE展望'], file: '21.html' },
        { num: '22', title: '多模态推理', topics: ['ViT编码器', '视觉问答', 'CUDA Graph加速', 'LoRA适配器'], file: '22.html' },
        { num: '23', title: 'nano-vLLM源码剖析', topics: ['1200行架构', 'Engine/Scheduler', 'ModelRunner', 'Triton Kernel'], file: '23.html' },
        { num: '24', title: '调试与问题排查', topics: ['CUDA OOM', 'NCCL调试', '性能退化', '常见错误速查'], file: '24.html' },
        { num: '25', title: '性能基准测试', topics: ['吞吐/延迟测试', '压测工具', 'Benchmark数据', '调优Checklist'], file: '25.html' },
        { num: '26', title: '未来趋势', topics: ['P-EAGLE', 'Model Runner V2', '智能路由', '竞品格局'], file: '26.html' },
        { num: '27', title: '实战项目', topics: ['RAG推理服务', '端到端搭建', 'Prefix Cache优化', '性能迭代'], file: '27.html' },
        { num: '28', title: '课程总结', topics: ['知识图谱', '核心要点', '进阶学习路径', '推荐资源'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
</body>
</html>
