<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>深度学习调参技巧与底层原理 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "🤖";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>深度学习调参技巧与底层原理</h1>
        <div class="sub">🔧 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '调参之道：从炼丹到科学', topics: ['调参方法论', '控制变量法', '实验管理', '先诊断再下手'], file: '01.html' },
        { num: '02', title: '梯度下降的数学直觉', topics: ['方向导数与梯度', 'SGD噪声特性', '一阶vs二阶方法', '动量法物理直觉'], file: '02.html' },
        { num: '03', title: '优化器选择：Adam vs SGD的底层逻辑', topics: ['Adam自适应机制', '平坦vs尖锐极小值', '两阶段训练原理', '优化器决策树'], file: '03.html' },
        { num: '04', title: '学习率：调参的第一优先级', topics: ['LR的几何意义', 'Warmup数学原理', 'Cosine退火', 'LR Range Test'], file: '04.html' },
        { num: '05', title: '批大小：梯度估计的精度博弈', topics: ['梯度方差与批大小', '大批量泛化退化', '梯度累积', '线性缩放法则'], file: '05.html' },
        { num: '06', title: '初始化：训练的起跑线', topics: ['Xavier推导', 'He初始化', '方差保持原理', '各层初始化策略'], file: '06.html' },
        { num: '07', title: '归一化层：训练稳定性的基石', topics: ['BN/LN/GN原理', '内部协变量偏移', '损失曲面平滑', '归一化选型'], file: '07.html' },
        { num: '08', title: '激活函数：非线性之源', topics: ['ReLU与dying ReLU', 'GELU/SiLU原理', '梯度流动分析', '激活函数选型'], file: '08.html' },
        { num: '09', title: '权重衰减与正则化的数学', topics: ['L1 vs L2几何', 'AdamW解耦原理', '数据集规模关系', '大LR正则化效应'], file: '09.html' },
        { num: '10', title: 'Dropout：隐式集成学习的数学', topics: ['集成学习本质', '倒置Dropout', '方差偏移冲突', '大模型时代定位'], file: '10.html' },
        { num: '11', title: '学习率调度：从固定到自适应', topics: ['衰减必要性', 'Cosine/Warmup', 'Cyclical LR', 'Warmup步数原则'], file: '11.html' },
        { num: '12', title: '损失函数的设计哲学', topics: ['交叉熵vs MSE', 'Focal Loss原理', 'Label Smoothing', '多任务平衡'], file: '12.html' },
        { num: '13', title: '数据增强与泛化的信息论视角', topics: ['隐式正则化', 'Mixup/CutMix', '流形混合', '增强强度匹配'], file: '13.html' },
        { num: '14', title: '评估与验证的科学方法', topics: ['交叉验证原理', '数据泄露排查', '验证集调穿', '离线vs线上'], file: '14.html' },
        { num: '15', title: '训练曲线全解读', topics: ['四种loss关系', '震荡诊断', '平台期分析', 'loss vs 准确率'], file: '15.html' },
        { num: '16', title: 'NaN与梯度爆炸的根因分析', topics: ['NaN三种模式', '逐层排查法', '梯度裁剪', '混合精度陷阱'], file: '16.html' },
        { num: '17', title: '小数据过拟合测试：调试的银弹', topics: ['过拟合测试', '随机标签测试', '通用逼近定理', '五类常见bug'], file: '17.html' },
        { num: '18', title: '调参优先级与方法论', topics: ['超参数重要性排序', '网格vs随机搜索', '贝叶斯优化', 'Hyperband'], file: '18.html' },
        { num: '19', title: 'CNN训练的核心法则', topics: ['3×3卷积法则', '感受野设计', '跳跃连接', '深度可分离卷积'], file: '19.html' },
        { num: '20', title: 'NLP模型微调的原理', topics: ['灾难性遗忘', '子词分词原理', '文本增强', 'BERT微调'], file: '20.html' },
        { num: '21', title: '推荐系统的特征与采样', topics: ['负采样原理', '特征分箱', '多任务梯度冲突', '推荐特有调参'], file: '21.html' },
        { num: '22', title: '类别不平衡与长尾分布', topics: ['不平衡伤害机制', 'Focal Loss梯度', '重采样vs重加权', '评估指标选择'], file: '22.html' },
        { num: '23', title: 'LoRA微调的数学本质', topics: ['低秩分解原理', 'Rank/Alpha关系', '平方根律新发现', 'LoRA调参清单'], file: '23.html' },
        { num: '24', title: 'SFT数据工程的科学方法', topics: ['Prompt先行原则', '数据质量vs数量', 'Chat Template', 'Loss不可靠'], file: '24.html' },
        { num: '25', title: 'RLHF对齐训练的底层逻辑', topics: ['PPO四模型架构', 'KL散度约束', 'Reward Hacking', 'DPO/GRPO'], file: '25.html' },
        { num: '26', title: 'Scaling Law与μP参数化', topics: ['幂律关系', 'μP特征学习', '-3/2幂律', 'DeepSeek策略'], file: '26.html' },
        { num: '27', title: '自动化调参与前沿趋势', topics: ['贪心对齐优化器', 'SAM平坦化', 'LLM辅助调参', '2025前沿'], file: '27.html' },
        { num: '28', title: '综合实战：从零调优一个模型', topics: ['完整调参流程', '调参决策树', '实战Checklist', '毕业寄语'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
