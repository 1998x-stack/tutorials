<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>宏观经济学 · 课程目录</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        /* Index-page-specific overrides that extend theme.css */
        body {
            padding: 2rem 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .double-border {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(90, 100, 140, 0.15), 0 8px 20px rgba(0, 20, 40, 0.08);
            border: 1px solid rgba(200, 210, 240, 0.5);
        }
        .container {
            display: block;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 4px solid #8b5cf6;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1::before {
            content: "📊";
            font-size: 2.2rem;
        }
        .header .sub {
            font-size: 1rem;
            background: #faf8ff;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #5b21b6;
            font-weight: 600;
            border: 1px solid #c4b5fd;
            white-space: nowrap;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0 1.2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 14px rgba(70, 80, 120, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(200, 210, 230, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 24px rgba(70, 80, 140, 0.15), 0 4px 12px rgba(40, 60, 100, 0.05);
            border-color: #c4b5fd;
            background: #fefefc;
        }
        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .chapter-num {
            font-size: 1.1rem;
            font-weight: 700;
            background: #7c3aed;
            color: white;
            padding: 0 0.6rem;
            border-radius: 40px;
            line-height: 1.6;
            display: inline-block;
            letter-spacing: 0.3px;
            min-width: 2.2rem;
            text-align: center;
        }
        .card:nth-child(6n+1) .chapter-num { background: #f97316; }
        .card:nth-child(6n+2) .chapter-num { background: #8b5cf6; }
        .card:nth-child(6n+3) .chapter-num { background: #7c3aed; }
        .card:nth-child(6n+4) .chapter-num { background: #3b82f6; }
        .card:nth-child(6n+5) .chapter-num { background: #ef4444; }
        .card:nth-child(6n) .chapter-num { background: #10b981; }
        .card-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: #4c1d95;
            letter-spacing: -0.3px;
            line-height: 1.3;
            flex: 1;
        }
        .topic-list {
            list-style: none;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }
        .topic-list li {
            font-size: 0.8rem;
            color: #2d3a54;
            background: #f5f3ff;
            padding: 0.1rem 0.7rem 0.2rem 1.2rem;
            border-radius: 30px;
            line-height: 1.6;
            position: relative;
            border: 1px solid #c4b5fd;
        }
        .topic-list li::before {
            content: "⚡";
            position: absolute;
            left: 4px;
            top: 0px;
            font-size: 0.7rem;
            color: #7c3aed;
        }
        .card-footer {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px dashed #c4b5fd;
            padding-top: 0.5rem;
        }
        .card-footer a {
            background: #ede9fe;
            color: #4c1d95;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.15s;
            border: 1px solid #c4b5fd;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-footer a::after { content: "→"; font-size: 1rem; }
        .card-footer a:hover {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            transform: scale(1.02);
        }
        .index-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 1rem;
            color: #5b21b6;
            background: #f5f3ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c4b5fd;
            font-weight: 500;
        }
        .container::before {
            content: "";
            display: block;
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6, #3b82f6, #f97316);
            border-radius: 10px;
            margin-bottom: 0.2rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem 0.8rem; }
            .double-border { padding: 1.2rem 1rem; border-radius: 32px; }
            .header h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card-title { font-size: 1.05rem; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="double-border">
    <div class="header">
        <h1>宏观经济学</h1>
        <div class="sub">📊 28章 实战体系</div>
    </div>
    <div id="cardContainer" class="course-grid"></div>
    <div class="index-footer">🚀 从入门到精通 · 实战驱动 · 踩坑避雷</div>
</div>

<script>
(function() {
    const courses = [
        { num: '01', title: '什么是宏观经济学', topics: ['宏观vs微观', '三大目标', '思想史演进', '研究方法'], file: '01.html' },
        { num: '02', title: '国民收入核算', topics: ['GDP三种核算方法', '名义vs实际GDP', 'GDP与GNP', 'GDP的局限性'], file: '02.html' },
        { num: '03', title: '价格与通货膨胀', topics: ['CPI/PPI/GDP平减指数', '通胀三类成因', '恶性通胀案例', '通缩危害'], file: '03.html' },
        { num: '04', title: '就业与失业', topics: ['失业率统计口径', '失业类型与自然率', '奥肯定律', '平台经济与灵活就业'], file: '04.html' },
        { num: '05', title: '货币与信用创造', topics: ['货币三大功能', 'M0/M1/M2层次', '存款派生与货币乘数', '央行角色'], file: '05.html' },
        { num: '06', title: '利率与金融体系', topics: ['名义vs实际利率', '费雪方程', '收益率曲线', '利率市场化改革'], file: '06.html' },
        { num: '07', title: '宏观数据解读实战', topics: ['数据来源', '高频指标体系', '季节调整陷阱', '相关≠因果'], file: '07.html' },
        { num: '08', title: '简单国民收入决定', topics: ['凯恩斯交叉图', '消费函数与MPC', '乘数效应', '节俭悖论'], file: '08.html' },
        { num: '09', title: '产品市场与IS曲线', topics: ['投资与利率', 'IS曲线推导', '财政政策移动IS', '挤出效应'], file: '09.html' },
        { num: '10', title: '货币市场与LM曲线', topics: ['流动性偏好', 'LM曲线推导', '流动性陷阱', 'LM到MP的现代演变'], file: '10.html' },
        { num: '11', title: 'IS-LM模型综合分析', topics: ['联立均衡求解', '财政货币政策实验', '特殊情形', '大萧条与2008危机'], file: '11.html' },
        { num: '12', title: '总需求-总供给模型', topics: ['AD/AS推导', '短期vs长期', '需求与供给冲击', '石油危机对比'], file: '12.html' },
        { num: '13', title: '消费理论深入', topics: ['永久收入假说', '生命周期假说', '李嘉图等价', '行为经济学修正'], file: '13.html' },
        { num: '14', title: '投资与金融加速器', topics: ['净现值法则', '托宾Q理论', '金融加速器', 'AI投资可持续性'], file: '14.html' },
        { num: '15', title: '货币政策工具与传导', topics: ['三大政策工具', '利率走廊体系', 'QE/QT实践', 'CBDC初探'], file: '15.html' },
        { num: '16', title: '财政政策与公共债务', topics: ['自动稳定器', '财政乘数之争', '债务动态学', 'MMT争议'], file: '16.html' },
        { num: '17', title: '通胀与失业的权衡', topics: ['菲利普斯曲线', '牺牲率', '理性预期革命', '2021-2025全球通胀'], file: '17.html' },
        { num: '18', title: '宏观审慎与金融稳定', topics: ['明斯基不稳定假说', '系统性风险', '宏观审慎工具箱', 'AI泡沫风险'], file: '18.html' },
        { num: '19', title: '开放经济宏观经济学', topics: ['国际收支BOP', '汇率制度', '三元悖论', '蒙代尔-弗莱明模型'], file: '19.html' },
        { num: '20', title: '汇率理论与货币区', topics: ['购买力平价', '利率平价', '最优货币区', '人民币汇率改革'], file: '20.html' },
        { num: '21', title: '经济增长：索洛模型', topics: ['资本积累与稳态', '技术进步来源', '索洛残差', '趋同与分化'], file: '21.html' },
        { num: '22', title: '内生增长与制度', topics: ['Romer模型', '人力资本', '制度决定论', '中等收入陷阱'], file: '22.html' },
        { num: '23', title: '经济周期理论', topics: ['RBC理论', '新凯恩斯周期', '信贷周期', '明斯基时刻'], file: '23.html' },
        { num: '24', title: '预期与宏观经济学', topics: ['适应性vs理性预期', '卢卡斯批判', '时间不一致性', '前瞻指引'], file: '24.html' },
        { num: '25', title: 'DSGE模型与现代方法', topics: ['微观基础', '新凯恩斯DSGE', 'Dynare实践', 'HANK前沿'], file: '25.html' },
        { num: '26', title: '中国宏观经济深度分析', topics: ['增长模式转型', '新旧动能K型分化', '房地产调整', '宏观经济治理'], file: '26.html' },
        { num: '27', title: '全球宏观经济热点', topics: ['关税战冲击', 'AI宏观效应', '中东能源冲击', '人口老龄化'], file: '27.html' },
        { num: '28', title: '综合实战', topics: ['分析框架总结', '宏观形势诊断', '政策模拟', '经济学家的工具箱'], file: '28.html' }
    ];
    const container = document.getElementById('cardContainer');
    if (!container) return;
    container.innerHTML = '';
    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'card-header';
        const numSpan = document.createElement('span');
        numSpan.className = 'chapter-num';
        numSpan.textContent = course.num;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = course.title;
        headerDiv.appendChild(numSpan);
        headerDiv.appendChild(titleSpan);
        card.appendChild(headerDiv);
        const topicUl = document.createElement('ul');
        topicUl.className = 'topic-list';
        course.topics.forEach(topic => {
            const li = document.createElement('li');
            li.textContent = topic;
            topicUl.appendChild(li);
        });
        card.appendChild(topicUl);
        const footerDiv = document.createElement('div');
        footerDiv.className = 'card-footer';
        const link = document.createElement('a');
        link.href = course.file;
        link.textContent = '开始学习 ';
        footerDiv.appendChild(link);
        card.appendChild(footerDiv);
        container.appendChild(card);
    });
})();
</script>
<noscript>
    <div style="background:#fcf0d9; padding:1rem; border-radius:20px; text-align:center;">
        您的浏览器未支持JavaScript，但课程目录已通过静态方式完整展示（请启用JS获得最佳体验）。
    </div>
</noscript>
</body>
</html>
